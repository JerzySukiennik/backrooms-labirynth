// LEVEL 0 MAP

// zones: hub cx1-8 · storage cx10-19 · office cx21-32/cz1-8 · landing cx21-32/cz10-12
// O = open doorway, R/B = colored doors, G = final gate opening
const MAP = [
  '##################################',
  '#........#..........#............#',
  '#........#..........#............#',

];
const MW = MAP[0].length, MH = MAP.length;
const cellAt = (cx, cz) => (cx < 0 || cz < 0 || cx >= MW || cz >= MH) ? '#' : MAP[cz][cx];
const cellToWorld = (cx, cz) => [(cx - MW / 2 + 0.5) * CFG.cell, (cz - MH / 2 + 0.5) * CFG.cell];
const SPAWN = { cx: 4, cz: 6, yaw: -Math.PI / 2 };

function regionAt(x, z) {
  const cx = Math.floor((x + MW * CFG.cell / 2) / CFG.cell);
  const cz = Math.floor((z + MH * CFG.cell / 2) / CFG.cell);
  if (cx <= 8) return 'hub';
  if (cx <= 19) return 'room1';
  return cz <= 8 ? 'room2' : 'landing';
}

//======================================================================
// PROCEDURAL TEXTURES
//======================================================================
function makeCanvas(size, draw) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  draw(g, size);
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
let seed = 1337;
function rnd() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

function noiseOver(g, s, amount) {
  const img = g.getImageData(0, 0, s, s), d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (rnd() * 2 - 1) * amount;
    d[i] += n; d[i + 1] += n; d[i + 2] += n * 0.7;
  }
  g.putImageData(img, 0, 0);
}
function stains(g, s, count, rMin, rMax, tone, aMax) {
  for (let i = 0; i < count; i++) {
    const x = rnd() * s, y = rnd() * s, r = rMin + rnd() * (rMax - rMin);
    const gr = g.createRadialGradient(x, y, 0, x, y, r);
    gr.addColorStop(0, `rgba(${tone},${(0.04 + rnd() * aMax).toFixed(3)})`);
    gr.addColorStop(1, `rgba(${tone},0)`);
    g.fillStyle = gr;
    g.fillRect(x - r, y - r, r * 2, r * 2);
  }
}

const texWall = makeCanvas(256, (g, s) => {
  g.fillStyle = '#c3ac50'; g.fillRect(0, 0, s, s);
  for (let x = 0; x < s; x += 32) {
    g.fillStyle = '#b7a049'; g.fillRect(x + 9, 0, 14, s);
    g.fillStyle = '#cdb65b'; g.fillRect(x + 8, 0, 1, s);
    g.fillStyle = '#cdb65b'; g.fillRect(x + 23, 0, 1, s);
    g.fillStyle = '#ab9541'; g.fillRect(x + 15, 0, 2, s);
  }
  stains(g, s, 9, 20, 70, '70,52,16', 0.10);
  noiseOver(g, s, 9);
  const grime = g.createLinearGradient(0, s - 52, 0, s);
  grime.addColorStop(0, 'rgba(38,28,8,0)');
  grime.addColorStop(1, 'rgba(38,28,8,0.42)');
  g.fillStyle = grime; g.fillRect(0, s - 52, s, 52);
  g.fillStyle = '#6e5f2c'; g.fillRect(0, s - 13, s, 13);
  g.fillStyle = '#7d6d35'; g.fillRect(0, s - 13, s, 2);

    const v = rnd();

}

//======================================================================
// PSX SHADERS (now modelMatrix-aware for dynamic bodies)
//======================================================================
const NUM_LIGHTS = LIGHT_CELLS.length;

const psxVertex = /* glsl */`
  uniform float uSnap;
  uniform vec3 uLightPos[${NUM_LIGHTS}];
  uniform vec3 uLightColor[${NUM_LIGHTS}];
  uniform float uLightIntensity[${NUM_LIGHTS}];
  uniform vec3 uSpotPos[2];
  uniform vec3 uSpotDir[2];
  uniform vec3 uSpotCol[2];
  uniform vec4 uSpotP[2];
  uniform vec3 uAmbient;
  uniform float uFogDensity;
  varying vec2 vUvW;
  varying float vW;
  varying vec3 vLight;
  varying float vFog;
  void main() {
    vec3 wp = (modelMatrix * vec4(position, 1.0)).xyz;
    vec3 n = normalize(mat3(modelMatrix) * normal);
    vec3 acc = uAmbient;
    for (int i = 0; i < ${NUM_LIGHTS}; i++) {
      vec3 toL = uLightPos[i] - wp;
      float d = length(toL);
      float nd = max(dot(n, toL / max(d, 0.001)), 0.0);
      float att = uLightIntensity[i] * 1.5 / (1.0 + 0.10 * d * d);
      att *= smoothstep(${LIGHT_RANGE.toFixed(1)}, ${(LIGHT_RANGE * 0.4).toFixed(1)}, d);
      acc += uLightColor[i] * (nd * 0.7 + 0.3) * att;
    }
    for (int i = 0; i < 2; i++) {
      if (uSpotP[i].z > 0.5) {
        vec3 toS = uSpotPos[i] - wp;
        float d = length(toS);
        vec3 L = toS / max(d, 0.001);
        float cone = smoothstep(uSpotP[i].x, uSpotP[i].y, dot(-L, uSpotDir[i]));
        float att = 1.0 / (1.0 + 0.055 * d * d);
        acc += uSpotCol[i] * (max(dot(n, L), 0.0) * 0.6 + 0.4) * cone * att;
      }
    }
    vLight = acc;
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    vFog = 1.0 - exp(-uFogDensity * uFogDensity * dot(mv.xyz, mv.xyz));
    vec4 clip = projectionMatrix * mv;
    vec3 ndc = clip.xyz / clip.w;
    ndc.xy = floor(ndc.xy * uSnap + 0.5) / uSnap;
    clip.xyz = ndc * clip.w;
    gl_Position = clip;
    vUvW = uv * clip.w;
    vW = clip.w;
  }
`;
const psxFragment = /* glsl */`
  uniform sampler2D map;
  uniform vec3 uFogColor;
  varying vec2 vUvW;
  varying float vW;
  varying vec3 vLight;
  varying float vFog;
  void main() {
    vec2 uv = vUvW / vW;
    vec3 tex = texture2D(map, uv).rgb;
    vec3 col = tex * vLight;
    col = mix(col, uFogColor, clamp(vFog, 0.0, 1.0));
    gl_FragColor = vec4(col, 1.0);
  }
`;
const psxEmissiveVertex = /* glsl */`
  uniform float uSnap;
  uniform float uFogDensity;
  varying vec2 vUvW;
  varying float vW;
  varying float vFog;
  void main() {
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    vFog = 1.0 - exp(-uFogDensity * uFogDensity * dot(mv.xyz, mv.xyz));
    vec4 clip = projectionMatrix * mv;
    vec3 ndc = clip.xyz / clip.w;
    ndc.xy = floor(ndc.xy * uSnap + 0.5) / uSnap;
    clip.xyz = ndc * clip.w;
    gl_Position = clip;
    vUvW = uv * clip.w;
    vW = clip.w;
  }
`;
const psxEmissiveFragment = /* glsl */`
  uniform sampler2D map;
  uniform vec3 uFogColor;
  uniform float uGlow;
  varying vec2 vUvW;
  varying float vW;
  varying float vFog;
  void main() {
    vec2 uv = vUvW / vW;
    vec3 tex = texture2D(map, uv).rgb * uGlow;
    vec3 col = mix(tex, uFogColor, clamp(vFog, 0.0, 1.0) * 0.6);
    gl_FragColor = vec4(col, 1.0);
  }
`;

const psxFragmentAlpha = /* glsl */`
  uniform sampler2D map;
  uniform vec3 uFogColor;
  varying vec2 vUvW;
  varying float vW;
  varying vec3 vLight;
  varying float vFog;
  void main() {
    vec2 uv = vUvW / vW;
    vec4 tex = texture2D(map, uv);
    if (tex.a < 0.35) discard;
    vec3 col = tex.rgb * vLight;
    col = mix(col, uFogColor, clamp(vFog, 0.0, 1.0));
    gl_FragColor = vec4(col, tex.a);
  }
`;
const psxSpriteFragment = /* glsl */`
  uniform sampler2D map;
  uniform vec3 uFogColor;
  uniform float uGlow;
  varying vec2 vUvW;
  varying float vW;
  varying float vFog;
  void main() {
    vec2 uv = vUvW / vW;
    vec4 tex = texture2D(map, uv);
    vec3 col = mix(tex.rgb * uGlow, uFogColor, clamp(vFog, 0.0, 1.0) * 0.5);
    gl_FragColor = vec4(col, tex.a * uGlow);
  }
`;
const uvDecalVertex = /* glsl */`
  uniform float uSnap;
  uniform vec3 uUvPos;
  uniform vec3 uUvDir;
  uniform float uUvOn;
  varying vec2 vUvW;
  varying float vW;
  varying float vReveal;
  void main() {
    vec3 wp = (modelMatrix * vec4(position, 1.0)).xyz;
    float rv = 0.0;
    if (uUvOn > 0.5) {
      vec3 toS = uUvPos - wp;
      float d = length(toS);
      vec3 L = toS / max(d, 0.001);
      float cone = smoothstep(0.80, 0.93, dot(-L, uUvDir));
      rv = cone * (1.0 / (1.0 + 0.10 * d * d));
    }
    vReveal = clamp(rv * 2.2, 0.0, 1.0);
    vec4 clip = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    vec3 ndc = clip.xyz / clip.w;
    ndc.xy = floor(ndc.xy * uSnap + 0.5) / uSnap;
    clip.xyz = ndc * clip.w;
    gl_Position = clip;
    vUvW = uv * clip.w;
    vW = clip.w;
  }
`;
const uvDecalFragment = /* glsl */`
  uniform sampler2D map;
  varying vec2 vUvW;
  varying float vW;
  varying float vReveal;
  void main() {
    vec2 uv = vUvW / vW;
    vec4 tex = texture2D(map, uv);
    gl_FragColor = vec4(tex.rgb * vReveal, tex.a * vReveal);
  }
`;

const lightPosArr = [], lightColArr = [], lightIntArr = [];
for (const L of LIGHT_CELLS) {
  const [x, z] = cellToWorld(L.cx, L.cz);
  lightPosArr.push(new THREE.Vector3(x, CFG.wallH - 0.08, z));
  lightColArr.push(LIGHT_COLOR.clone());
  lightIntArr.push(1.0);
}
const spotPos = [new THREE.Vector3(), new THREE.Vector3()];
const spotDir = [new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, 0, -1)];
const spotCol = [new THREE.Vector3(), new THREE.Vector3()];
const spotP = [new THREE.Vector4(0.86, 0.965, 0, 0), new THREE.Vector4(0.90, 0.975, 0, 0)];
const uvSpotUniforms = {
  uUvPos: { value: new THREE.Vector3() },
  uUvDir: { value: new THREE.Vector3(0, 0, -1) },
  uUvOn: { value: 0 },
};
const sharedLightUniforms = {
  uSnap: { value: CFG.snapGrid },
  uLightPos: { value: lightPosArr },
  uLightColor: { value: lightColArr },
  uLightIntensity: { value: lightIntArr },
  uSpotPos: { value: spotPos },
  uSpotDir: { value: spotDir },
  uSpotCol: { value: spotCol },
  uSpotP: { value: spotP },
  uAmbient: { value: CFG.ambient },
  uFogColor: { value: CFG.fogColor },
  uFogDensity: { value: CFG.fogDensity },
};
function psxMaterial(tex, opts = {}) {
  const uniforms = { ...sharedLightUniforms, map: { value: tex } };
  if (opts.ambient) uniforms.uAmbient = { value: opts.ambient };
  return new THREE.ShaderMaterial({
    uniforms,
    vertexShader: psxVertex,
    fragmentShader: opts.alpha ? psxFragmentAlpha : psxFragment,
    transparent: !!opts.alpha,
    polygonOffset: !!opts.decal,
    polygonOffsetFactor: opts.decal ? -2 : 0,
  });
}
function psxSprite(tex, glow = 1.0) {
  return new THREE.ShaderMaterial({
    uniforms: {
      uSnap: sharedLightUniforms.uSnap,
      uFogColor: sharedLightUniforms.uFogColor,
      uFogDensity: sharedLightUniforms.uFogDensity,
      map: { value: tex },
      uGlow: { value: glow },
    },
    vertexShader: psxEmissiveVertex,
    fragmentShader: psxSpriteFragment,
    transparent: true,
    depthWrite: false,
  });
}
function uvDecalMaterial(tex) {
  return new THREE.ShaderMaterial({
    uniforms: {
      uSnap: sharedLightUniforms.uSnap,
      map: { value: tex },
      ...uvSpotUniforms,
    },
    vertexShader: uvDecalVertex,
    fragmentShader: uvDecalFragment,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
}
function psxEmissive(tex, glowUniform) {
  return new THREE.ShaderMaterial({
    uniforms: {
      uSnap: sharedLightUniforms.uSnap,
      uFogColor: sharedLightUniforms.uFogColor,
      uFogDensity: sharedLightUniforms.uFogDensity,
      map: { value: tex },
      uGlow: glowUniform,
    },
    vertexShader: psxEmissiveVertex,
    fragmentShader: psxEmissiveFragment,
  });
}
const matWood = psxMaterial(texWood);
const matCardboard = psxMaterial(texCardboard);
const matMetal = psxMaterial(texMetal);
const matFabric = psxMaterial(texFabric);

function wallQuad(x0, y0, z0, x1, y1, z1, nx, nz, segs) {
  const w = Math.hypot(x1 - x0, z1 - z0), h = y1 - y0;
  const geo = new THREE.PlaneGeometry(w, h, segs, 5);
  const m = new THREE.Matrix4();
  const yaw = Math.atan2(nx, nz);
  m.makeRotationY(yaw);
  m.setPosition((x0 + x1) / 2, (y0 + y1) / 2, (z0 + z1) / 2);
  geo.applyMatrix4(m);
  return geo;
}
function remapWallUV(geo) {
  const pos = geo.attributes.position, nrm = geo.attributes.normal, uv = geo.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    const nx = nrm.getX(i), y = pos.getY(i);
    const along = Math.abs(nx) > 0.5 ? pos.getZ(i) : pos.getX(i);
    uv.setXY(i, along / CFG.cell, y / CFG.wallH);
  }
  uv.needsUpdate = true;
}
function remapFlatUV(geo, scale) {
  const pos = geo.attributes.position, uv = geo.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    uv.setXY(i, pos.getX(i) / scale, pos.getZ(i) / scale);
  }
  uv.needsUpdate = true;
}

function protoMesh(parts) {
  const group = new THREE.Group();

  for (const p of parts) {

    byMat.get(p.mat).push(boxGeo(...p.box));

  for (const [mat, geos] of byMat) {
    group.add(new THREE.Mesh(mergeGeometries(geos), mat));
  }
  return group;
}

const props = [];
function spawnProp(f) {
  const T = TYPES[f.type];
  let [wx, wz] = f.at ? f.at : cellToWorld(...f.cell);
  wx += f.dx || 0; wz += f.dz || 0;
  const y = f.lift || 0.001;
  const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, f.rot, 0));
  const desc = RAPIER.RigidBodyDesc.dynamic()
    .setTranslation(wx, y, wz)
    .setRotation({ x: q.x, y: q.y, z: q.z, w: q.w })
    .setLinearDamping(0.12)
    .setAngularDamping(0.5);
  if (T.ccd) desc.setCcdEnabled(true);
  const body = world.createRigidBody(desc);
  for (const cd of T.colliders) {
    world.createCollider(
      RAPIER.ColliderDesc.cuboid(...cd.half)
        .setTranslation(...cd.at)
        .setFriction(0.6)
        .setRestitution(0.05)
        .setMass(T.mass / T.colliders.length),
      body
    );
  }
  const mesh = T.proto.clone();
  mesh.position.set(wx, y, wz);
  mesh.quaternion.copy(q);
  scene.add(mesh);
  const prop = {
    body, mesh, type: f.type, mass: T.mass,
    keyColor: T.keyColor || null,
    isLight: T.isLight || null,
    noteIdx: f.note !== undefined ? f.note : null,
    lightOn: false,
    home: { x: wx, y: f.lift || 0.001, z: wz, q },
  };
  props.push(prop);
  bodyToProp.set(body.handle, prop);
  return prop;
}

function buildDoor(cx, cz, axis, color) {
  const [wx, wz] = cellToWorld(cx, cz);
  const TH = CFG.wallH, postW = 0.55, opening = 2 - postW * 2;
  const along = axis === 'x' ? 'z' : 'x';
  const post = (off) => {
    const size = axis === 'x' ? [1.2, TH, postW] : [postW, TH, 1.2];
    const pos = axis === 'x' ? [wx, TH / 2, wz + off] : [wx + off, TH / 2, wz];
    staticMesh(boxGeo(...size, ...pos), matFrame);
    staticCuboid(size[0] / 2, size[1] / 2, size[2] / 2, ...pos);
  };
  post(1 - postW / 2); post(-(1 - postW / 2));
  const lh = TH - 2.15;
  const lsize = axis === 'x' ? [1.2, lh, opening] : [opening, lh, 1.2];
  const lpos = [wx, 2.15 + lh / 2, wz];
  staticMesh(boxGeo(...lsize, ...lpos), matFrame);
  staticCuboid(lsize[0] / 2, lsize[1] / 2, lsize[2] / 2, ...lpos);

  const hingeOff = opening / 2;
  const pivot = new THREE.Group();
  pivot.position.set(
    axis === 'x' ? wx : wx - hingeOff,
    0,
    axis === 'x' ? wz - hingeOff : wz
  );
  const slabGeo = axis === 'x'
    ? boxGeo(0.09, 2.12, opening, 0, 1.06, hingeOff)
    : boxGeo(opening, 2.12, 0.09, hingeOff, 1.06, 0);
  pivot.add(new THREE.Mesh(slabGeo, doorMat[color]));
  scene.add(pivot);
  const colBody = world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(wx, 0, wz));
  world.createCollider(
    axis === 'x'
      ? RAPIER.ColliderDesc.cuboid(0.045, 1.06, opening / 2).setTranslation(0, 1.06, 0)
      : RAPIER.ColliderDesc.cuboid(opening / 2, 1.06, 0.045).setTranslation(0, 1.06, 0),
    colBody
  );
  const door = { color, x: wx, z: wz, pivot, colBody, open: false, axis };
  doors.push(door);
  return door;
}

function makeRT() {

  if (rt) rt.dispose();

const postCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
postScene.add(new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.ShaderMaterial({
    uniforms: postUniforms,
    vertexShader: /* glsl */`
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: /* glsl */`
      uniform sampler2D tScene;
      uniform vec2 uRes;
      uniform float uTime;
      uniform float uGlitch;
      varying vec2 vUv;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
      float bayer2(vec2 a) { a = floor(a); return fract(a.x / 2.0 + a.y * a.y * 0.75); }
      float bayer4(vec2 a) { return bayer2(0.5 * a) * 0.25 + bayer2(a); }
      void main() {
        vec2 uv = vUv;
        if (uGlitch > 0.001) {
          float line = floor(uv.y * uRes.y);
          float shift = (hash(vec2(line, floor(uTime * 24.0))) - 0.5) * 0.22 * uGlitch;
          uv.x = fract(uv.x + shift);
          uv.y = fract(uv.y + (hash(vec2(floor(uTime * 13.0), 7.0)) - 0.5) * 0.08 * uGlitch);
        }
        vec3 col = texture2D(tScene, uv).rgb;
        vec2 px = vUv * uRes;
        float d = bayer4(px) - 0.5;
        col = floor(col * 31.0 + 0.5 + d * 1.4) / 31.0;
        float g = hash(px + fract(uTime) * 61.7) - 0.5;
        col += g * 0.045;
        if (uGlitch > 0.001) {
          col = mix(col, vec3(hash(px * 0.7 + uTime * 91.0)), uGlitch * 0.55);
        }
        float vig = smoothstep(1.25, 0.42, length(vUv - 0.5) * 1.6);
        col *= mix(0.72, 1.0, vig);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
    depthTest: false,
    depthWrite: false,
  })
));

});

function stepPlayer(dt) {
  const fwd = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right = new THREE.Vector3(-fwd.z, 0, fwd.x);
  const wish = new THREE.Vector3();
  if (keys['KeyW']) wish.add(fwd);
  if (keys['KeyS']) wish.sub(fwd);
  if (keys['KeyD']) wish.add(right);
  if (keys['KeyA']) wish.sub(right);
  player.crouching = !!(keys['ControlLeft'] || keys['ControlRight']);
  player.sprinting = !!(keys['ShiftLeft'] || keys['ShiftRight']) && !player.crouching;
  const speed = CFG.walkSpeed * (player.sprinting ? CFG.sprintMul : 1) * (player.crouching ? CFG.crouchMul : 1);
  if (wish.lengthSq() > 0) {
    wish.normalize().multiplyScalar(speed);
    player.vel.x += (wish.x - player.vel.x) * Math.min(1, CFG.accel * dt);
    player.vel.z += (wish.z - player.vel.z) * Math.min(1, CFG.accel * dt);
  } else {
    player.vel.x -= player.vel.x * Math.min(1, CFG.decel * dt);
    player.vel.z -= player.vel.z * Math.min(1, CFG.decel * dt);
  }
  if (player.grounded && player.vy < 0) player.vy = -0.9;
  else player.vy += CFG.gravity * dt;

  const desired = { x: player.vel.x * dt, y: player.vy * dt, z: player.vel.z * dt };
  charController.computeColliderMovement(charCollider, desired);
  const mv = charController.computedMovement();
  player.grounded = charController.computedGrounded();
  const t = charBody.translation();
  charBody.setNextKinematicTranslation({ x: t.x + mv.x, y: t.y + mv.y, z: t.z + mv.z });
}

function updateCamera(dt) {
  const t = charBody.translation();
  const feetY = t.y - CAPS_CENTER;
  const targetEye = player.crouching ? CFG.eyeCrouch : CFG.eyeStand;
  player.eye += (targetEye - player.eye) * Math.min(1, 10 * dt);
  const moveAmt = Math.hypot(player.vel.x, player.vel.z);
  const targetAmp = moveAmt > 0.3 && player.grounded ? (player.sprinting ? 0.045 : 0.028) : 0;
  player.bobAmp += (targetAmp - player.bobAmp) * Math.min(1, 8 * dt);
  player.bobPhase += moveAmt * dt * 4.6;
  camera.position.set(
    t.x + Math.cos(player.yaw) * Math.sin(player.bobPhase * 0.5) * player.bobAmp * 0.6,
    feetY + player.eye + Math.abs(Math.sin(player.bobPhase)) * player.bobAmp,
    t.z
  );
  camera.rotation.order = 'YXZ';
  camera.rotation.set(player.pitch, player.yaw, Math.sin(player.bobPhase * 0.5) * player.bobAmp * 0.35);
  player.shake = Math.max(0, (player.shake || 0) - dt * 0.7);
  if (player.shake > 0.001) {
    camera.rotation.x += (Math.random() - 0.5) * 0.06 * player.shake;
    camera.rotation.z += (Math.random() - 0.5) * 0.05 * player.shake;
  }
  const targetFov = player.sprinting && moveAmt > 2 ? 78 : 72;
  if (Math.abs(camera.fov - targetFov) > 0.1) {
    camera.fov += (targetFov - camera.fov) * Math.min(1, 6 * dt);
    camera.updateProjectionMatrix();
  }
}

//======================================================================
// GRAB SYSTEM — Human Fall Flat style force-capped spring
//======================================================================
const grab = {
  prop: null,
  localAnchor: new THREE.Vector3(),
  holdDist: 1.2,
  hover: null,
};
const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3(), _v3 = new THREE.Vector3();
const _q1 = new THREE.Quaternion();

function camForward(out) {
  return out.set(
    -Math.sin(player.yaw) * Math.cos(player.pitch),
    Math.sin(player.pitch),
    -Math.cos(player.yaw) * Math.cos(player.pitch)
  );
}
function raycastProp() {
  const dir = camForward(_v1);
  const ray = new RAPIER.Ray(
    { x: camera.position.x, y: camera.position.y, z: camera.position.z },
    { x: dir.x, y: dir.y, z: dir.z }
  );
  const hit = world.castRay(ray, CFG.grabReach, true, undefined, undefined, charCollider, charBody);
  if (!hit) return null;
  const body = hit.collider.parent();
  if (!body || !body.isDynamic()) return null;
  const prop = bodyToProp.get(body.handle);
  if (!prop) return null;
  const toi = hit.timeOfImpact !== undefined ? hit.timeOfImpact : hit.toi;
  return { prop, point: _v2.set(ray.origin.x + dir.x * toi, ray.origin.y + dir.y * toi, ray.origin.z + dir.z * toi), dist: toi };
}
function tryGrab() {
  const hit = raycastProp();
  if (!hit) return;
  const b = hit.prop.body;
  const t = b.translation(), r = b.rotation();
  _q1.set(r.x, r.y, r.z, r.w).invert();
  grab.localAnchor.copy(hit.point).sub(_v3.set(t.x, t.y, t.z)).applyQuaternion(_q1);
  grab.holdDist = Math.max(0.85, Math.min(1.7, hit.dist));
  grab.prop = hit.prop;
  b.setAngularDamping(2.2);
  b.wakeUp();
  if (hit.prop.keyColor && !keysSeen.has(hit.prop.keyColor)) {
    keysSeen.add(hit.prop.keyColor);
    updateKeysHud();
  }
}
function releaseGrab(throwIt) {
  if (!grab.prop) return;
  const b = grab.prop.body;
  b.resetForces(true);
  b.resetTorques(true);
  b.setAngularDamping(0.5);
  if (throwIt) {
    const dir = camForward(_v1);
    dir.y += 0.14;
    dir.normalize();
    const imp = Math.min(grab.prop.mass * 7, 85);
    b.applyImpulse({ x: dir.x * imp, y: dir.y * imp, z: dir.z * imp }, true);
  }
  grab.prop = null;
}
function stepGrab() {
  if (!grab.prop) return;
  const b = grab.prop.body;
  const t = b.translation(), r = b.rotation();
  _q1.set(r.x, r.y, r.z, r.w);
  const worldAnchor = _v1.copy(grab.localAnchor).applyQuaternion(_q1).add(_v2.set(t.x, t.y, t.z));
  const target = camForward(_v3).multiplyScalar(grab.holdDist).add(camera.position);
  const err = target.sub(worldAnchor);
  if (err.length() > CFG.grabBreakDist) { releaseGrab(false); return; }
  const lv = b.linvel(), av = b.angvel();
  const rArm = _v2.copy(worldAnchor).sub(_v2.set(t.x, t.y, t.z));
  const rx = worldAnchor.x - t.x, ry = worldAnchor.y - t.y, rz = worldAnchor.z - t.z;
  const velAtPoint = _v2.set(
    lv.x + av.y * rz - av.z * ry,
    lv.y + av.z * rx - av.x * rz,
    lv.z + av.x * ry - av.y * rx
  );
  const m = grab.prop.mass;
  const kp = m * 60, kd = m * 9;
  const F = err.multiplyScalar(kp).addScaledVector(velAtPoint, -kd);
  const fMax = Math.min(m * 9.81 * 0.92 + 150, 700);
  if (F.length() > fMax) F.setLength(fMax);
  b.resetForces(true);
  b.resetTorques(true);
  b.addForceAtPoint({ x: F.x, y: F.y, z: F.z }, { x: worldAnchor.x, y: worldAnchor.y, z: worldAnchor.z }, true);
}

window.addEventListener('mousedown', e => {
  if (state !== 'play' || !locked) return;
  if (e.button === 0 && !grab.prop) tryGrab();
});
window.addEventListener('mouseup', e => {
  if (e.button === 0 && grab.prop) releaseGrab(false);
});
window.addEventListener('keydown', e => {
  if (state !== 'play') return;
  if (e.code === 'KeyF' && grab.prop && locked) releaseGrab(true);

  for (const c of keysSeen) {
    const d = document.createElement('div');
    d.className = 'key' + (gate.filled.has(c) ? ' filled' : '');
    d.style.borderColor = KEYS_DEF[c].css;
    d.style.color = KEYS_DEF[c].css;
    if (gate.filled.has(c)) d.style.background = KEYS_DEF[c].css;
    keysEl.appendChild(d);
  }
}

const interacts = [];
function addInteract(x, y, z, r, prompt, act) { interacts.push({ x, y, z, r, prompt, act }); }
function findInteract() {
  const cp = camera.position, fwd = camForward(_v3);
  let best = null, bestD = 1e9;
  for (const it of interacts) {
    const pp = it.pos ? it.pos() : it;
    const dx = pp.x - cp.x, dy = pp.y - cp.y, dz = pp.z - cp.z;
    const d = Math.hypot(dx, dy, dz);
    if (d > it.r || d >= bestD) continue;
    if ((dx * fwd.x + dy * fwd.y + dz * fwd.z) / Math.max(d, 0.001) < 0.4) continue;
    if (!it.prompt()) continue;
    best = it; bestD = d;
  }
  return best;
}
addInteract(KIOSK.x + 0.3, 1.2, KIOSK.z, 2.1, () => S.shopUse, () => openShop());
for (const p of props) {
  if (p.noteIdx === null) continue;
  interacts.push({
    pos: () => p.mesh.position, r: 1.6,
    prompt: () => S.noteUse,
    act: () => openNote(S.noteTitle, S.notes[p.noteIdx]),
  });
}
addInteract(SAFE_POS.x, 0.4, SAFE_POS.z, 1.8, () => safe.open ? null : S.safeUse, () => openKeypad());
for (const d of doors) {
  addInteract(d.x, 1.2, d.z, 2.2,
    () => d.open ? null : (grab.prop?.keyColor === d.color ? S.doorOpen : S.doorNeed(keyName(d.color))),
    () => {
      if (d.open) return;
      if (grab.prop?.keyColor === d.color) { openDoor(d); }
      else showToast(S.doorNeed(keyName(d.color)));
    });
}
for (const sk of gate.sockets) {
  addInteract(sk.x, 1.35, 11.9, 1.9,
    () => gate.filled.has(sk.color) ? null : (grab.prop?.keyColor === sk.color ? S.socketPut(keyName(sk.color)) : S.socketNeed(keyName(sk.color))),
    () => {
      if (gate.filled.has(sk.color)) return;
      if (grab.prop?.keyColor === sk.color) insertKey(sk);
      else showToast(S.gateSealed);
    });
}

// UI overlays
function openUI(el) {
  uiOpen = el;
  el.classList.add('show');
  document.exitPointerLock();
  actionEl.textContent = '';
}
function closeUI(relock = true) {
  if (!uiOpen) return;
  uiOpen.classList.remove('show');
  uiOpen = null;
  if (relock) renderer.domElement.requestPointerLock();
}
const shopEl = document.getElementById('shop');
const keypadEl = document.getElementById('keypad');
const noteEl = document.getElementById('note');
document.getElementById('shop-title').textContent = S.shopTitle;
document.getElementById('shop-close').textContent = S.shopClose;
document.getElementById('kp-title').textContent = S.kpTitle;
document.getElementById('kp-close').textContent = S.kpClose;
document.getElementById('note-close').textContent = S.noteClose;
document.getElementById('shop-close').onclick = () => closeUI();
document.getElementById('kp-close').onclick = () => closeUI();
document.getElementById('note-close').onclick = () => closeUI();

const SHOP_ITEMS = [
  {
    name: () => S.itemUv, desc: () => S.itemUvDesc, price: 5,
    can: () => true,
    buy() {
      spawnProp({ type: 'uvlight', cell: [0, 0], at: [KIOSK.x + 0.5, KIOSK.z], rot: Math.PI / 2, lift: 0.66 });
      showToast(S.boughtUv);
    },
  },
  {
    name: () => S.itemHead, desc: () => S.itemHeadDesc, price: 8,
    can: () => !shopState.headlamp,
    buy() {
      shopState.headlamp = true;
      shopState.headlampOn = true;
      showToast(S.boughtHead);
    },
  },
  {
    name: () => S.itemHint, desc: () => S.itemHintDesc, price: 3,
    can: () => true,

      const region = regionAt(camera.position.x, camera.position.z);

      openNote(S.hintTitle, S.hints[region]);

];
function renderShop() {
  document.getElementById('shop-gold').textContent = S.shopGold(shopState.gold);
  const wrap = document.getElementById('shop-items');
  wrap.innerHTML = '';
  SHOP_ITEMS.forEach(item => {
    const row = document.createElement('div');
    row.className = 'shop-row';
    const left = document.createElement('div');
    left.innerHTML = `<div class="nm">${item.name()} · ${item.price}₲</div><div class="ds">${item.desc()}</div>`;
    const btn = document.createElement('button');
    btn.className = 'btn';
    if (!item.can()) { btn.textContent = S.owned; btn.disabled = true; }
    else if (shopState.gold < item.price) { btn.textContent = S.noGold; btn.disabled = true; }
    else {
      btn.textContent = S.buy;
      btn.onclick = () => { setGold(shopState.gold - item.price); item.buy(); if (uiOpen === shopEl) renderShop(); };
    }
    row.appendChild(left); row.appendChild(btn);
    wrap.appendChild(row);
  });
}
function openShop() { renderShop(); openUI(shopEl); }
function openNote(title, text) {
  document.getElementById('note-title').textContent = title;
  document.getElementById('note-text').textContent = text;
  openUI(noteEl);
}

// keypad
let kpEntered = '';
const kpDisplay = document.getElementById('kp-display');
function kpRender() { kpDisplay.textContent = kpEntered.padEnd(4, '·'); }
{
  const grid = document.getElementById('kp-grid');
  const layout = ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'C', '0', 'OK'];
  for (const k of layout) {
    const b = document.createElement('button');
    b.className = 'btn';
    b.textContent = k;
    b.onclick = () => kpPress(k);
    grid.appendChild(b);
  }
}
function kpPress(k) {
  kpDisplay.classList.remove('err');
  if (k === 'C') kpEntered = '';
  else if (k === 'OK') {
    if (kpEntered === SAFE_CODE) { closeUI(); openSafe(); return; }
    kpEntered = '';
    kpDisplay.classList.add('err');
  } else if (kpEntered.length < 4) kpEntered += k;
  kpRender();
}
function openKeypad() {
  if (safe.open) return;
  kpEntered = ''; kpRender();
  kpDisplay.classList.remove('err');
  openUI(keypadEl);
}
window.addEventListener('keydown', e => {
  if (uiOpen !== keypadEl) return;
  if (/^[0-9]$/.test(e.key)) kpPress(e.key);
  else if (e.key === 'Enter') kpPress('OK');
  else if (e.key === 'Backspace') { kpEntered = kpEntered.slice(0, -1); kpRender(); }
});

// spot lights (flashlight in hand + headlamp)
function updateSpots() {
  let held = null;
  if (grab.prop?.isLight && grab.prop.lightOn) held = grab.prop;
  else {
    for (const p of props) {
      if (p.isLight && p.lightOn) {
        const d = p.mesh.position.distanceTo(camera.position);
        if (d < 14) { held = p; break; }
      }
    }
  }
  let uvOn = 0;
  if (held) {
    const dir = held === grab.prop
      ? camForward(_v1)
      : _v1.set(0, 0, -1).applyQuaternion(held.mesh.quaternion);
    spotPos[0].copy(held.mesh.position).addScaledVector(dir, 0.15);
    spotDir[0].copy(dir);
    if (held.isLight === 'uv') {
      spotCol[0].set(0.36, 0.22, 0.66);
      uvSpotUniforms.uUvPos.value.copy(spotPos[0]);
      uvSpotUniforms.uUvDir.value.copy(dir);
      uvOn = 1;
    } else {
      spotCol[0].set(1.5, 1.36, 1.05);
    }
    spotP[0].z = 1;
  } else spotP[0].z = 0;
  uvSpotUniforms.uUvOn.value = uvOn;
  if (shopState.headlampOn) {
    spotPos[1].copy(camera.position);
    spotDir[1].copy(camForward(_v2));
    spotCol[1].set(0.8, 0.75, 0.58);
    spotP[1].z = 1;
  } else spotP[1].z = 0;
}

// per-frame gameplay updates
function gameplayFrame(dt, t) {
  for (let i = animators.length - 1; i >= 0; i--) {
    animators[i].update(dt);
    if (animators[i].done) animators.splice(i, 1);
  }
  if (state === 'play') {
    const pt = charBody.translation();
    for (const c of coins) {
      if (c.taken) continue;
      c.mesh.rotation.y += dt * 2.4;
      c.mesh.position.y = c.baseY + Math.sin(t * 2 + c.phase) * 0.03;
      const dx = c.mesh.position.x - pt.x, dz = c.mesh.position.z - pt.z;
      const dy = c.mesh.position.y - (pt.y - CAPS_CENTER + 0.9);
      if (dx * dx + dz * dz + dy * dy * 0.5 < 0.72) {
        c.taken = true;
        scene.remove(c.mesh);
        setGold(shopState.gold + 1);
        showToast(S.goldPick);
      }
    }
    if (gate.opened && pt.z > 13.1 && pt.x > 16.5 && pt.x < 23.5) endGame();
  }
  for (const sg of signs) {
    sg.mesh.position.y = sg.baseY + Math.sin(t * 0.8 + sg.phase) * 0.05;
    sg.mesh.rotation.y = Math.atan2(camera.position.x - sg.mesh.position.x, camera.position.z - sg.mesh.position.z);
  }
  gate.redGlow.material.uniforms.uGlow.value = 0.72 + Math.sin(t * 0.9) * 0.26;
  updateSpots();
}

// ending
const endingEl = document.getElementById('ending');
document.getElementById('end-title').textContent = S.endTitle;
document.getElementById('end-text').textContent = S.endText;
const endBtn = document.getElementById('end-btn');
endBtn.textContent = S.endBtn;
function endGame() {
  if (state !== 'play') return;
  state = 'ending';
  releaseGrab(false);
  document.exitPointerLock();
  endingEl.classList.add('show');
  requestAnimationFrame(() => endingEl.classList.add('on'));
}
endBtn.onclick = () => {
  endingEl.classList.remove('on');
  endingEl.classList.remove('show');
  charBody.setTranslation({ x: spawnX, y: CAPS_CENTER, z: spawnZ }, true);
  player.vel.set(0, 0, 0); player.vy = 0;
  player.yaw = SPAWN.yaw; player.pitch = 0;
  state = 'play';
  renderer.domElement.requestPointerLock();
};

let promptTick = 0;
function updatePrompt() {
  if (state !== 'play' || !locked || uiOpen) { actionEl.textContent = ''; crossEl.classList.remove('active'); return; }
  const it = findInteract();
  if (it) {
    actionEl.textContent = it.prompt();
    crossEl.classList.add('active');
    return;
  }
  if (grab.prop) {
    actionEl.textContent = grab.prop.isLight ? S.heldLight : S.held;
    crossEl.classList.add('active');
    return;
  }
  if (++promptTick % 4 !== 0) return;
  const hit = raycastProp();
  actionEl.textContent = hit ? S.grab : '';
  crossEl.classList.toggle('active', !!hit);
}

//======================================================================
// SYNC + ANTI-SOFTLOCK RESPAWN
//======================================================================
function syncMeshes() {
  for (const p of props) {
    if (p.body.isSleeping()) continue;
    const t = p.body.translation(), r = p.body.rotation();
    p.mesh.position.set(t.x, t.y, t.z);
    p.mesh.quaternion.set(r.x, r.y, r.z, r.w);
  }
}
const RESPAWN_X = floorW / 2 + 1.5, RESPAWN_Z = 19;
let respawnTick = 0;
function checkRespawns() {
  if (++respawnTick % 60 !== 0) return;
  for (const p of props) {
    const t = p.body.translation();
    if (t.y < -2.5 || Math.abs(t.x) > RESPAWN_X || Math.abs(t.z) > RESPAWN_Z) {
      if (grab.prop === p) releaseGrab(false);
      p.body.setTranslation({ x: p.home.x, y: p.home.y + 0.4, z: p.home.z }, true);
      p.body.setRotation({ x: p.home.q.x, y: p.home.q.y, z: p.home.q.z, w: p.home.q.w }, true);
      p.body.setLinvel({ x: 0, y: 0, z: 0 }, true);
      p.body.setAngvel({ x: 0, y: 0, z: 0 }, true);
    }
  }
}

//======================================================================
// FLUORESCENT FLICKER
//======================================================================
let flickTimer = 0, flickState = 1;
function updateFlicker(t, dt) {
  flickTimer -= dt;
  if (flickTimer <= 0) {
    if (flickState === 1) {
      flickState = Math.random() < 0.75 ? 2 : 0;
      flickTimer = flickState === 2 ? 0.03 + Math.random() * 0.1 : 0.05 + Math.random() * 0.25;
    } else {
      flickState = 1;
      flickTimer = 0.4 + Math.random() * 3.2;
    }
  }
  const glow = flickState === 1 ? 1.0 : flickState === 2 ? 0.55 + Math.random() * 0.2 : 0.06;
  flickerGlow.value = glow;
  lightIntArr[0] = glow;
  const hum = 1.0 + Math.sin(t * 120.0) * 0.012;
  for (let i = 1; i < NUM_LIGHTS; i++) lightIntArr[i] = hum;
}

//======================================================================
// GAME STATE + INTRO
//======================================================================
let state = 'menu';
const overlayEl = document.getElementById('overlay');
const pauseEl = document.getElementById('pause');
const fpsEl = document.getElementById('fps');
let introT = 0;
const INTRO_LEN = 1.9;

promptEl.textContent = STR[LANG].enter;

overlayEl.addEventListener('click', () => {
  if (state !== 'menu') return;
  state = 'intro';
  introT = 0;
  overlayEl.classList.add('hidden');
  renderer.domElement.requestPointerLock();
});
pauseEl.addEventListener('click', () => renderer.domElement.requestPointerLock());

let menuT = 0;
function updateMenuCam(dt) {
  menuT += dt;
  camera.position.set(spawnX + Math.sin(menuT * 0.11) * 0.4, 1.55, spawnZ + Math.cos(menuT * 0.07) * 0.4);
  camera.rotation.order = 'YXZ';
  camera.rotation.set(Math.sin(menuT * 0.13) * 0.04, SPAWN.yaw + Math.sin(menuT * 0.05) * 0.3, 0);
}
function updateIntro(dt) {
  introT += dt;
  const k = Math.min(1, introT / INTRO_LEN);
  const ease = 1 - Math.pow(1 - k, 3);
  camera.position.set(spawnX, 7.5 - ease * (7.5 - CFG.eyeStand), spawnZ);
  camera.rotation.order = 'YXZ';
  const shake = (1 - ease) * 0.12;
  camera.rotation.set(
    -0.6 * (1 - ease) + (Math.random() - 0.5) * shake,
    SPAWN.yaw + (Math.random() - 0.5) * shake * 2,
    (Math.random() - 0.5) * shake
  );
  postUniforms.uGlitch.value = Math.max(0, 1 - ease * 1.15);
  if (k >= 1) {
    state = 'play';
    postUniforms.uGlitch.value = 0;
  }
}

//======================================================================
// MAIN LOOP — fixed-step physics + render
//======================================================================
let last = performance.now(), acc = 0;
let fpsAcc = 0, fpsN = 0, fpsClock = 0;
let manualTick = false;
function loop(now) {
  if (!manualTick) requestAnimationFrame(loop);
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.1) dt = 0.1;
  const t = now / 1000;

  postUniforms.uTime.value = t;
  updateFlicker(t, dt);

  acc += dt;
  let sub = 0;
  while (acc >= CFG.step && sub < 3) {
    if (state === 'play' && locked) stepPlayer(CFG.step);
    stepGrab();
    world.step();
    syncMeshes();
    checkRespawns();
    acc -= CFG.step;
    sub++;
  }
  if (sub === 3) acc = 0;

  if (state === 'menu') updateMenuCam(dt);
  else if (state === 'intro') updateIntro(dt);
  else updateCamera(dt);

  gameplayFrame(dt, t);
  updatePrompt();

  renderer.setRenderTarget(rt);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  postUniforms.tScene.value = rt.texture;
  renderer.render(postScene, postCam);

  fpsAcc += dt; fpsN++; fpsClock += dt;
  if (fpsClock >= 0.5) {
    let awake = 0;
    for (const p of props) if (!p.body.isSleeping()) awake++;
    fpsEl.textContent = `${Math.round(fpsN / fpsAcc)} FPS · ${awake} AWAKE`;
    fpsAcc = 0; fpsN = 0; fpsClock = 0;
  }
}
requestAnimationFrame(loop);

// debug hooks (used for automated verification during development)
window.__br = {
  props, player, grab, tryGrab, releaseGrab, doors, gate, safe, coins,
  world, RAPIER, raycastProp, camera, camForward,
  shopState, setGold, openSafe, openShop, openKeypad, kpPress, findInteract,
  insertKey, openDoor,
  setView(x, z, yaw, pitch) {
    charBody.setTranslation({ x, y: CAPS_CENTER, z }, true);
    player.yaw = yaw; player.pitch = pitch;
    camera.position.set(x, CFG.eyeStand, z);
    camera.rotation.order = 'YXZ';
    camera.rotation.set(pitch, yaw, 0);
  },
  aimAt(x, y, z) {
    const dx = x - camera.position.x, dy = y - camera.position.y, dz = z - camera.position.z;
    player.yaw = Math.atan2(-dx, -dz);
    player.pitch = Math.atan2(dy, Math.hypot(dx, dz));
    camera.rotation.set(player.pitch, player.yaw, 0);
  },
  skipIntro() {
    state = 'play';
    overlayEl.classList.add('hidden');
    postUniforms.uGlitch.value = 0;
    updateCamera(0.016);
  },
  awake: () => props.filter(p => !p.body.isSleeping()).length,
  state: () => state,
  region: () => regionAt(camera.position.x, camera.position.z),
  tick(n = 1) {
    manualTick = true;
    for (let i = 0; i < n; i++) loop(last + 16.7);
    manualTick = false;
  },
};

const fontLink = document.createElement('link');
fontLink.rel = 'stylesheet';
fontLink.href = 'https://fonts.googleapis.com/css2?family=VT323&display=swap';
document.head.appendChild(fontLink);
