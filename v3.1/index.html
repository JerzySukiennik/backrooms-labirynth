<!DOCTYPE html>
<html lang="pl">
<head>
<!--
  Backrooms Labirynth — v3 / Milestones 7.3 + 9: the complete game
  New rooms (slider now 2-15): BALLPIT (wade through physics balls for the
  key), FUSES (flip breakers in the blink order of the ceiling lamps),
  SCALE (load the platform with the exact target weight), MIRROR (the safe
  code is written mirrored — read it in the room's real mirror).
  M9: solo checkpoint saves (continue from the menu), guest mid-run
  rejoin, quality + volume sliders on the pause screen, loading tips,
  photo mode [P] with your own avatar in frame.
  Fixes: Level 94 z-fighting/backward-walking animals/panorama over the
  doors/affine warp, thin first-person torso, office digit #4 on hard
  moved to the ceiling (never missing), the dark room actually dark
  (stronger negative lights, bigger light budget), water steps sliced
  from loud parts of the sample with fade envelopes.
  ---- previous (v2.3 / M7.2): ----
  DARK: pitch-black room (negative light sources soak the ambient), the key
  glints faintly on the floor — bring a flashlight; hard = under a box.
  CARS: one drivable physics car per player, colored like your avatar;
  park each car in its color-matched garage stall, key on the pedestal.
  ANIMALS (Level 94): pastel town — hills, houses, fountain, floating
  castle; count every animal's legs, the sum opens the 2-digit safe.
  Rooms slider max is now 11.
  ---- previous (v2.2 / M8): ----
  M8: the void behind the gate is now a place — red sky, ash ground, three
  giant machines you can switch on (press, turbine, conveyor), physical
  scrap, distant silhouettes, and a monument that ends the run with full
  stats (time / keys / gold). Live stats panel on the landing wall.
  Fixes: knees/elbows bent the wrong way (gait finally reads forward),
  seated pose matches the seat's orientation (no sitting on tipped chairs),
  huge menu title + per-screen headers, symmetric centered menu, full-range
  sliders, solution behind a spoiler on the pause screen, rocket nose sits
  on the body, office digits placed on real walls, fetched water-splash
  steps, gate sockets spread along the wall, cart with thicker tub
  colliders, chest patch faces forward, universal key is never consumed at
  doors and can fill one gate socket instead of a missing key.
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backrooms Labirynth</title>
<style>

  .m-row { display: flex; gap: 10px; align-items: center; justify-content: center; }
  #m-colors { display: flex; gap: 8px; }

  }
  #m-colors .sw.sel { border-color: #e8d88a; }
  .btn.sm { padding: 5px 14px; font-size: 15px; margin-top: 0; }

  #m-nick { width: 180px !important; font-size: 20px !important; letter-spacing: 0.15em !important; }
  .btn.m-big {

  .m-slider { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    text-shadow: 0 0 22px rgba(220,190,90,0.4), 3px 3px 0 #3a3010;

  }
  #m-start[disabled] { letter-spacing: 0.12em; }
</style>
</head>

function mulberry32(a) {
  return () => {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function makeCanvas(size, draw) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  draw(g, size);
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
let seed = 1337;
function rnd() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

function noiseOver(g, s, amount) {
  const img = g.getImageData(0, 0, s, s), d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (rnd() * 2 - 1) * amount;
    d[i] += n; d[i + 1] += n; d[i + 2] += n * 0.7;
  }
  g.putImageData(img, 0, 0);
}
function stains(g, s, count, rMin, rMax, tone, aMax) {
  for (let i = 0; i < count; i++) {
    const x = rnd() * s, y = rnd() * s, r = rMin + rnd() * (rMax - rMin);
    const gr = g.createRadialGradient(x, y, 0, x, y, r);
    gr.addColorStop(0, `rgba(${tone},${(0.04 + rnd() * aMax).toFixed(3)})`);
    gr.addColorStop(1, `rgba(${tone},0)`);
    g.fillStyle = gr;
    g.fillRect(x - r, y - r, r * 2, r * 2);
  }
}

function makeTextTexture(lines, { lineH = 58, font = 'bold 38px monospace', color = '#e9dc9a', glow = 'rgba(233,220,154,0.5)' } = {}) {

  const w = Math.ceil(Math.max(...lines.map(ln => meas.measureText(ln).width))) + 48;
  c.width = w; c.height = lines.length * lineH + 26;
  const g = c.getContext('2d');
  g.font = font; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = glow; g.shadowBlur = 12;
  g.fillStyle = color;
  lines.forEach((ln, i) => g.fillText(ln, w / 2, 24 + i * lineH));
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
  t.colorSpace = THREE.SRGBColorSpace;
  return { tex: t, aspect: c.width / c.height };
}

const NUM_LIGHTS = MAXL;

const psxVertex = /* glsl */`
  uniform float uSnap;
  uniform vec3 uLightPos[${NUM_LIGHTS}];
  uniform vec3 uLightColor[${NUM_LIGHTS}];
  uniform float uLightIntensity[${NUM_LIGHTS}];
  uniform vec3 uSpotPos[2];
  uniform vec3 uSpotDir[2];
  uniform vec3 uSpotCol[2];
  uniform vec4 uSpotP[2];
  uniform vec3 uAmbient;
  uniform float uFogDensity;
  uniform float uWarp;
  uniform float uWarpT;
  varying vec2 vUvW;
  varying float vW;
  varying vec3 vLight;
  varying float vFog;
  void main() {
    vec3 wp = (modelMatrix * vec4(position, 1.0)).xyz;
    vec3 n = normalize(mat3(modelMatrix) * normal);

function wallQuad(x0, y0, z0, x1, y1, z1, nx, nz, segs, v0 = 0) {
  const w = Math.hypot(x1 - x0, z1 - z0), h = y1 - y0;
  const geo = new THREE.PlaneGeometry(w, h, segs, 5);
  const m = new THREE.Matrix4();
  const yaw = Math.atan2(nx, nz);
  m.makeRotationY(yaw);
  m.setPosition((x0 + x1) / 2, (y0 + y1) / 2, (z0 + z1) / 2);
  geo.applyMatrix4(m);
  // UV per face: u follows world distance, v spans THIS face's full height
  // (one stretched wallpaper on tall walls — no duplicated skirting mid-wall)
  const pos = geo.attributes.position, uv = geo.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    const along = Math.abs(nx) > 0.5 ? pos.getZ(i) : pos.getX(i);
    const frac = (pos.getY(i) - Math.min(y0, y1)) / Math.max(0.001, h);
    uv.setXY(i, along / CFG.cell, v0 + (1 - v0) * frac);
  }
  return geo;
}
function remapFlatUV(geo, scale) {
  const pos = geo.attributes.position, uv = geo.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    uv.setXY(i, pos.getX(i) / scale, pos.getZ(i) / scale);
  }
  uv.needsUpdate = true;
}

const H = CFG.wallH, C = CFG.cell;
const flickerGlow = { value: 1.0 };
const steadyGlow = { value: 1.0 };
let floorW = 0, floorD = MH * C;
const LIGHTS_PLACED = [];
function lightAt(cx, cz, h, flicker = false) {
  const idx = addLight(cx, cz, h, flicker);
  LIGHTS_PLACED.push({ cx, cz, h, flicker });
  return idx;
}

  return { wx0: 2 * x0 - 34, wx1: 2 * x1 - 32, wz0: -12, wz1: 12 };
}
function buildGeometry() {
  const wallGeos = [];
  for (let cz = 0; cz < MH; cz++) {
    for (let cx = 0; cx < MW; cx++) {
      const c = GRID[cz][cx];
      const [wx, wz] = cellToWorld(cx, cz);
      if (c === '#') {
        const x0 = wx - C / 2, x1 = wx + C / 2, z0 = wz - C / 2, z1 = wz + C / 2;
        if (cellAt(cx, cz - 1) !== '#') { const hh = roomHAt(cx); wallGeos.push(wallQuad(x0, 0, z0, x1, hh, z0, 0, -1, 4)); }
        if (cellAt(cx, cz + 1) !== '#') { const hh = roomHAt(cx); wallGeos.push(wallQuad(x1, 0, z1, x0, hh, z1, 0, 1, 4)); }
        if (cellAt(cx - 1, cz) !== '#') { const hh = roomHAt(cx - 1); wallGeos.push(wallQuad(x0, 0, z1, x0, hh, z0, -1, 0, 4)); }
        if (cellAt(cx + 1, cz) !== '#') { const hh = roomHAt(cx + 1); wallGeos.push(wallQuad(x1, 0, z0, x1, hh, z1, 1, 0, 4)); }
      } else if (c === 'P') {
        const r = 0.45, hh = roomHAt(cx);
        wallGeos.push(wallQuad(wx - r, 0, wz - r, wx + r, hh, wz - r, 0, -1, 2));
        wallGeos.push(wallQuad(wx + r, 0, wz + r, wx - r, hh, wz + r, 0, 1, 2));
        wallGeos.push(wallQuad(wx - r, 0, wz + r, wx - r, hh, wz - r, -1, 0, 2));
        wallGeos.push(wallQuad(wx + r, 0, wz - r, wx + r, hh, wz + r, 1, 0, 2));

    }
  }

    const [dwx, dwz] = cellToWorld(d.cx, d.cz);
    const hw = roomHAt(d.cx - 1), he = roomHAt(d.cx + 1);
    if (hw > H + 0.01) {
      wallGeos.push(wallQuad(dwx - 1, H, dwz + 1, dwx - 1, hw, dwz - 1, -1, 0, 2, 0.28));
    }
    if (he > H + 0.01) {

  remapFlatUV(floorGeo, C);
  scene.add(new THREE.Mesh(floorGeo, psxMaterial(texFloor)));

  const ceilRects = [{ x0: 1, x1: 8, h: H }, { x0: LANDING.x0, x1: LANDING.x1, h: H }];
  for (const r of ROOMS) ceilRects.push({ x0: r.x0, x1: r.x1, h: r.def.h || H });
  const ceilGeos = [];
  for (const cr of ceilRects) {
    const w = (cr.x1 - cr.x0 + 1) * C;
    const g = new THREE.PlaneGeometry(w, 24, (cr.x1 - cr.x0 + 1) * 2, 24);
    g.rotateX(Math.PI / 2);
    g.translate(2 * cr.x0 - 34 + w / 2, cr.h, 0);
    ceilGeos.push(g);
  }
  for (const d of DOOR_CELLS) {
    const [wx, wz] = cellToWorld(d.cx, d.cz);
    const g = new THREE.PlaneGeometry(C, C);
    g.rotateX(Math.PI / 2);
    g.translate(wx, H, wz);
    ceilGeos.push(g);
  }
  const ceilGeo = mergeGeometries(ceilGeos);
  remapFlatUV(ceilGeo, 1.3);
  scene.add(new THREE.Mesh(ceilGeo, psxMaterial(texCeil)));

  const panelsByH = new Map();
  const lightKeys = new Set(LIGHTS_PLACED.map(L => `${L.cx},${L.cz}`));
  const fillerRects = ceilRects;
  for (const cr of fillerRects) {
    for (let cz = 1; cz < MH - 1; cz++) {
      for (let cx = cr.x0; cx <= cr.x1; cx++) {
        if (GRID[cz][cx] === '.' && cx % 3 === 1 && cz % 3 === 1 && !lightKeys.has(`${cx},${cz}`)) {
          LIGHTS_PLACED.push({ cx, cz, h: cr.h, fillerOnly: true });
        }
      }
    }
  }
  for (const L of LIGHTS_PLACED) {
    if (cellAt(L.cx, L.cz) !== '.') continue;
    const [wx, wz] = cellToWorld(L.cx, L.cz);
    const g = new THREE.PlaneGeometry(1.5, 0.75);
    g.rotateX(Math.PI / 2);
    g.translate(wx, L.h - 0.02, wz);
    if (L.flicker) {
      scene.add(new THREE.Mesh(g, psxEmissive(texPanel, flickerGlow)));
    } else {
      if (!panelsByH.has(L.h)) panelsByH.set(L.h, []);
      panelsByH.get(L.h).push(g);
    }
  }
  for (const geos of panelsByH.values()) {
    scene.add(new THREE.Mesh(mergeGeometries(geos), psxEmissive(texPanel, steadyGlow)));
  }
}

function staticCuboid(hx, hy, hz, x, y, z) {
  const body = world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(x, y, z));
  world.createCollider(RAPIER.ColliderDesc.cuboid(hx, hy, hz).setFriction(0.7), body);

const DOOR_CELLS = [];
function buildStaticColliders() {
  for (let cz = 0; cz < MH; cz++) {
    for (let cx = 0; cx < MW; cx++) {
      const c = GRID[cz][cx];
      if (c !== '#' && c !== 'P') continue;
      const [wx, wz] = cellToWorld(cx, cz);
      const half = c === 'P' ? 0.45 : C / 2;
      staticCuboid(half, 2.8, half, wx, 2.8, wz);
    }
  }
  for (const d of DOOR_CELLS) {
    const [dwx, dwz] = cellToWorld(d.cx, d.cz);
    const mh = Math.max(roomHAt(d.cx - 1), roomHAt(d.cx + 1));
    if (mh > H + 0.01) staticCuboid(1, (mh - H) / 2, 1, dwx, (H + mh) / 2, dwz);
  }
  const fcx = WORLD_MINX + floorW / 2;
  staticCuboid(floorW / 2 + 4, 0.5, floorD / 2 + 8, fcx, -0.5, 0);
  const ceilRects = [{ x0: 1, x1: 8, h: H }, { x0: LANDING.x0, x1: LANDING.x1, h: H }];
  for (const r of ROOMS) ceilRects.push({ x0: r.x0, x1: r.x1, h: r.def.h || H });
  for (const cr of ceilRects) {
    const w = (cr.x1 - cr.x0 + 1) * C;
    staticCuboid(w / 2 + 1, 0.5, floorD / 2, 2 * cr.x0 - 34 + w / 2, cr.h + 0.5, 0);
  }
}

    byMat.get(p.mat).push(boxGeo(...p.box));

  for (const [mat, geos] of byMat) {

const _fogBase = new THREE.Color(0x2a2410), _fogRed = new THREE.Color(0x2c0b07);
let _zoneMix = 0, _statT = 0;
function machinesFrame(dt, t) {
  if (!MACH.built) return;
  // red-world fog takes over as you cross the gate
  const inZone = camera.position.z > 12.4 ? 1 : 0;
  _zoneMix += (inZone - _zoneMix) * Math.min(1, 2.2 * dt);
  CFG.fogColor.copy(_fogBase).lerp(_fogRed, _zoneMix);
  scene.background.copy(CFG.fogColor);
  sharedLightUniforms.uFogDensity.value = CFG.fogDensity + (0.034 - CFG.fogDensity) * _zoneMix;
  if (MACH.monoGlow) MACH.monoGlow.value = 0.62 + Math.sin(t * 1.4) * 0.3;
  MACH.blinks.forEach((b, i) => { b.value = (Math.sin(t * (1.1 + i * 0.37) + i * 2) > 0.55 ? 0.85 : 0.08); });
  for (const m of MACH.machines) {
    if (m.kind === 'press') {
      if (m.on) {
        m.t += dt;
        const ph = m.t % 2.4;
        // slam down fast, grind back up
        if (ph < 0.5) {
          m.y = 3.6 - (ph / 0.5) * 2.7;
          if (!m.hit && ph > 0.42) {
            m.hit = true;
            playBuf('thud', { vol: 0.5, rate: 0.55 });
            if (Math.abs(camera.position.x - m.x) + Math.abs(camera.position.z - m.z) < 12) player.shake = Math.max(player.shake || 0, 0.25);
          }
        } else { m.y = 0.9 + Math.min(1, (ph - 0.5) / 1.6) * 2.7; m.hit = false; }
      } else {
        m.y = (m.y ?? 3.6) + (3.6 - (m.y ?? 3.6)) * Math.min(1, 2 * dt);
        m.t = 0; m.hit = false;
      }
      m.head.position.set(m.x, m.y, m.z);
      m.hb.setNextKinematicTranslation({ x: m.x, y: m.y, z: m.z });
    } else if (m.kind === 'turbine') {
      m.speed += ((m.on ? 7 : 0) - m.speed) * Math.min(1, 0.8 * dt);
      m.fan.rotation.z += m.speed * dt;
    } else if (m.kind === 'conveyor') {
      if (m.on) m.t += dt * m.vel;
      for (let i = 0; i < m.cleats.length; i++) {
        const u = ((m.t + (i / m.cleats.length) * m.len) % m.len);
        m.cleats[i].position.x = m.x - m.len / 2 + u;
      }
      if (m.on && isAuthority()) {
        for (const p of props) {
          const pt = p.body.translation();
          if (Math.abs(pt.x - m.x) < m.len / 2 + 0.2 && Math.abs(pt.z - m.z) < 0.8 && pt.y > m.bh - 0.15 && pt.y < m.bh + 0.9) {
            const lv = p.body.linvel();
            if (lv.x < m.vel) { p.body.wakeUp(); p.body.setLinvel({ x: Math.min(m.vel, lv.x + 3 * dt * m.vel), y: lv.y, z: lv.z * 0.92 }, true); }
          }
        }
      }
    }
  }

}

function stepPlayer(dt) {

  const right = new THREE.Vector3(-fwd.z, 0, fwd.x);

  player.sprinting = !!(keys['ShiftLeft'] || keys['ShiftRight']) && !player.crouching;

    && (charBody.translation().y - CAPS_CENTER) < FLOOD.waterY - 0.1;
  const speed = CFG.walkSpeed * (player.sprinting ? CFG.sprintMul : 1)
    * (player.crouching ? CFG.crouchMul : 1) * (inWater ? 0.62 : 1);

function updateCamera(dt) {
  const t = charBody.translation();
  const feetY = t.y - CAPS_CENTER;
  const targetEye = seat.prop ? 0.95 : player.crouching ? CFG.eyeCrouch : CFG.eyeStand;
  player.eye += (targetEye - player.eye) * Math.min(1, 10 * dt);
  const moveAmt = Math.hypot(player.vel.x, player.vel.z);
  const targetAmp = moveAmt > 0.3 && player.grounded ? (player.sprinting ? 0.045 : 0.028) : 0;
  player.bobAmp += (targetAmp - player.bobAmp) * Math.min(1, 8 * dt);
  player.bobPhase += moveAmt * dt * 4.6;
  camera.position.set(
    t.x + Math.cos(player.yaw) * Math.sin(player.bobPhase * 0.5) * player.bobAmp * 0.6,
    feetY + player.eye + Math.abs(Math.sin(player.bobPhase)) * player.bobAmp,
    t.z

  camera.rotation.order = 'YXZ';
  camera.rotation.set(player.pitch, player.yaw, Math.sin(player.bobPhase * 0.5) * player.bobAmp * 0.35);
  player.shake = Math.max(0, (player.shake || 0) - dt * 0.7);

    camera.rotation.x += (Math.random() - 0.5) * 0.06 * player.shake;

// spot lights (flashlight in hand + headlamp)
function updateSpots() {
  let held = null;
  if (grab.prop?.isLight && grab.prop.lightOn) held = grab.prop;
  else {
    for (const p of props) {
      if (p.isLight && p.lightOn) {
        const d = p.mesh.position.distanceTo(camera.position);
        if (d < 14) { held = p; break; }
      }
    }
  }
  let uvOn = 0;
  if (held) {
    const dir = held === grab.prop
      ? camForward(_v1)
      : _v1.set(0, 0, -1).applyQuaternion(held.mesh.quaternion);
    spotPos[0].copy(held.mesh.position).addScaledVector(dir, 0.15);
    spotDir[0].copy(dir);
    if (held.isLight === 'uv') {
      spotCol[0].set(0.52, 0.32, 0.9);
      spotP[0].x = 0.6; spotP[0].y = 0.88;
      uvSpotUniforms.uUvPos.value.copy(spotPos[0]);
      uvSpotUniforms.uUvDir.value.copy(dir);
      uvOn = DIFFICULTY === 'easy' ? 1.4 : 1;
    } else {
      spotCol[0].set(1.5, 1.36, 1.05);
      spotP[0].x = 0.86; spotP[0].y = 0.965;
    }
    spotP[0].z = 1;
  } else spotP[0].z = 0;
  if (shopState.flashT > 0) {
    uvOn = 3.4 * Math.min(1, shopState.flashT / 0.28);
    uvSpotUniforms.uUvPos.value.copy(camera.position);
    uvSpotUniforms.uUvDir.value.copy(camForward(_v1));
    uvSpotUniforms.uUvCone.value.set(-0.6, 0.05);
  } else {
    uvSpotUniforms.uUvCone.value.set(0.42, 0.80);
  }
  uvSpotUniforms.uUvOn.value = uvOn;
  if (shopState.headlampOn) {
    spotPos[1].copy(camera.position);
    spotDir[1].copy(camForward(_v2));
    spotCol[1].set(0.8, 0.75, 0.58);
    spotP[1].z = 1;
  } else spotP[1].z = 0;
}

// per-frame gameplay updates
function gameplayFrame(dt, t) {
  for (let i = animators.length - 1; i >= 0; i--) {
    animators[i].update(dt);
    if (animators[i].done) animators.splice(i, 1);
  }
  for (const c of coins) {
    if (c.taken) continue;
    c.mesh.rotation.y += dt * 2.4;
    c.mesh.position.y = c.baseY + Math.sin(t * 2 + c.phase) * 0.03;
  }
  if (state === 'play') {
    const pt = charBody.translation();
    if (isAuthority()) {
      forEachPlayerPos((px, py, pz, pid) => {
        for (let i = 0; i < coins.length; i++) {
          const c = coins[i];
          if (c.taken) continue;
          const dx = c.mesh.position.x - px, dz = c.mesh.position.z - pz;
          const dy = c.mesh.position.y - (py + 0.9);
          if (dx * dx + dz * dz + dy * dy * 0.5 < 0.72) takeCoin(i, pid);
        }
        for (let i = props.length - 1; i >= 0; i--) {
          const p = props[i];
          if (!p.isCoin || p.collectedBy?.has(pid)) continue;
          const mp = p.body.translation();
          const dx = mp.x - px, dz = mp.z - pz, dy = mp.y - (py + 0.7);
          if (dx * dx + dz * dz + dy * dy * 0.4 < 0.3) takeCoinProp(p, pid);
        }
      });
    }
  }
  for (const fn of ROOM_FRAMES) fn(dt, t);
  if (shopState.flashT > 0) {
    shopState.flashT = Math.max(0, shopState.flashT - dt);
    postUniforms.uFlash.value = Math.min(1, shopState.flashT * 2.4);
  } else if (postUniforms.uFlash.value > 0) postUniforms.uFlash.value = 0;
  if (worldBuilt && gate.plates.length && state === 'play') {
    for (const pl of gate.plates) {
      pl.on = playerNear(pl.x, pl.z, 0.68);
      pl.glowU.value += ((pl.on ? 0.85 : 0) - pl.glowU.value) * Math.min(1, 10 * dt);
    }
  }
  if (isAuthority() && worldBuilt && state === 'play' && !gate.opened && !gate.opening
    && gate.sockets.length && gate.filled.size >= gate.sockets.length) {
    if (!gate.platesArmed || gate.plates.every(pl => pl.on)) {
      openGate();
      bcEv({ k: 'gate' });
    }
  }
  for (const sg of signs) {
    sg.mesh.position.y = sg.baseY + Math.sin(t * 0.8 + sg.phase) * 0.05;
    sg.mesh.rotation.y = Math.atan2(camera.position.x - sg.mesh.position.x, camera.position.z - sg.mesh.position.z);
  }
  if (gate.redGlow) gate.redGlow.material.uniforms.uGlow.value = 0.72 + Math.sin(t * 0.9) * 0.26;
  carDriveLocal(dt);
  applyPeerDrives(dt);
  machinesFrame(dt, t);
  saveFrame(dt);
  checkSafeDoors();
  presenceFrame(dt, t);
  updateSpots();
}

// SYNC + ANTI-SOFTLOCK RESPAWN

function syncMeshes() {
  for (const p of props) {
    if (p.body.isSleeping() && isAuthority()) continue;
    const t = p.body.translation(), r = p.body.rotation();
    p.mesh.position.set(t.x, t.y, t.z);
    p.mesh.quaternion.set(r.x, r.y, r.z, r.w);
  }
}
let respawnTick = 0;
function checkRespawns() {
  if (!isAuthority()) return;
  if (++respawnTick % 60 !== 0) return;
  for (const p of props) {
    if (p.roomIdx > 0 && ROOMS[p.roomIdx]?.frozen) continue;
    const t = p.body.translation();
    // scrap living in the machine world is exempt from the z-bounds check
    const inMach = MACH.built && t.z > 12 && t.z < MACH.z1 + 0.5 && Math.abs(t.x - MACH.cx) < MACH.hw + 0.5;
    if (t.y < -2.5 || (!inMach && (t.x < WORLD_MINX - 1 || t.x > WORLD_MAXX + 1 || Math.abs(t.z) > RESPAWN_Z))) {
      if (grab.prop === p) releaseGrab(false);
      p.body.setTranslation({ x: p.home.x, y: p.home.y + 0.4, z: p.home.z }, true);
      p.body.setRotation({ x: p.home.q.x, y: p.home.q.y, z: p.home.q.z, w: p.home.q.w }, true);
      p.body.setLinvel({ x: 0, y: 0, z: 0 }, true);
      p.body.setAngvel({ x: 0, y: 0, z: 0 }, true);
    }
  }
}

let flickTimer = 0, flickState = 1;
function updateFlicker(t, dt) {
  flickTimer -= dt;
  if (flickTimer <= 0) {
    if (flickState === 1) {
      flickState = Math.random() < 0.75 ? 2 : 0;
      flickTimer = flickState === 2 ? 0.03 + Math.random() * 0.1 : 0.05 + Math.random() * 0.25;
    } else {
      flickState = 1;
      flickTimer = 0.4 + Math.random() * 3.2;
    }
  }
  const glow = flickState === 1 ? 1.0 : flickState === 2 ? 0.55 + Math.random() * 0.2 : 0.06;
  flickerGlow.value = glow * presenceDim.value;
  const hum = (1.0 + Math.sin(t * 120.0) * 0.012) * presenceDim.value;
  for (let i = 0; i < lightCount; i++) {
    lightIntArr[i] = i === flickerIdx ? glow * presenceDim.value : hum;
  }
  steadyGlow.value = presenceDim.value;
}

//======================================================================
// PRESENCE — nothing hunts you, but something is here.
// Visual/audio only; never touches physics or puzzle objects.
//======================================================================
const presence = {
  nextAt: 26 + Math.random() * 30,
  silhouette: null, watch: 0,
  dimT: -1, warpUntil: 0,
};
const counters = [];
function makeCounter(x, y, z, rotY) {
  const cnv = document.createElement('canvas');
  cnv.width = 64; cnv.height = 32;
  const tex = new THREE.CanvasTexture(cnv);
  tex.magFilter = THREE.NearestFilter; tex.minFilter = THREE.NearestFilter;
  const housing = new THREE.Mesh(boxGeo(0.36, 0.2, 0.05, 0, 0, 0), matMetal);
  const glowU = { value: 0.75 };
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.14), psxEmissive(tex, glowU));
  screen.position.z = 0.028;
  const g2 = new THREE.Group();
  g2.add(housing, screen);
  g2.position.set(x, y, z);
  g2.rotation.y = rotY;
  scene.add(g2);
  counters.push({ g: cnv.getContext('2d'), tex, glowU, val: 4000 + Math.floor(Math.random() * 4000), next: Math.random() });
}
// haunted counters are placed by buildWorld on random room walls
function drawCounter(c) {
  const g = c.g;
  g.fillStyle = '#070a06'; g.fillRect(0, 0, 64, 32);
  if (Math.random() < 0.06) return;
  g.font = 'bold 21px monospace';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = '#5fdc7a'; g.shadowBlur = 5;
  g.fillStyle = '#7fdc8a';
  g.fillText(String(c.val).padStart(4, '0'), 32, 17);
}
function lightsDip() { presence.dimT = 0; }
function distantSteps() {
  const pan = (Math.random() * 2 - 1) * 0.8;
  for (let i = 0; i < 4 + Math.floor(Math.random() * 3); i++) {
    setTimeout(() => playSteps({ vol: 0.13, rate: 0.8, pan, lp: 640 }), i * (380 + Math.random() * 120));
  }
}
function trySilhouette() {
  if (presence.silhouette) return;
  const fwd = camForward(_v1);
  for (let att = 0; att < 14; att++) {
    const cx = 1 + Math.floor(Math.random() * (MW - 2));
    const cz = 1 + Math.floor(Math.random() * (MH - 2));
    if (cellAt(cx, cz) !== '.') continue;
    const [wx, wz] = cellToWorld(cx, cz);
    const dx = wx - camera.position.x, dz = wz - camera.position.z;
    const d = Math.hypot(dx, dz);
    if (d < 8 || d > 19) continue;
    const dot = (dx * fwd.x + dz * fwd.z) / d;
    if (dot < 0.35 || dot > 0.93) continue;
    const ray = new RAPIER.Ray(
      { x: camera.position.x, y: 1.4, z: camera.position.z },
      { x: dx / d, y: 0, z: dz / d }
    );
    const hit = world.castRay(ray, d - 0.6, true, undefined, undefined, charCollider, charBody);
    if (hit) continue;
    const rig = makeRig('#0b0b0e', new Set());
    rig.root.position.set(wx, 0, wz);
    rig.root.rotation.y = Math.atan2(-dx, -dz);
    scene.add(rig.root);
    presence.silhouette = { rig, life: 3.5 + Math.random() * 1.5 };
    presence.watch = 0;
    playBuf('breath', { vol: 0.22, pan: dx > 0 ? 0.5 : -0.5, lp: 800 });
    return;
  }
}
function vanishSilhouette(seen) {
  if (!presence.silhouette) return;
  scene.remove(presence.silhouette.rig.root);
  presence.silhouette = null;
  if (seen) {
    postUniforms.uGlitch.value = Math.max(postUniforms.uGlitch.value, 0.33);
    playBuf('stinger', { vol: 0.3, rate: 1.4 });
    player.shake = Math.max(player.shake || 0, 0.35);
  }
}
function triggerPresence() {
  const roll = Math.random();
  const pan = (Math.random() * 2 - 1) * 0.7;
  if (roll < 0.15) lightsDip();
  else if (roll < 0.33) playWhisper(pan);
  else if (roll < 0.48) playKnock(pan);
  else if (roll < 0.6) playBuf('breath', { vol: 0.3, pan, lp: 900 });
  else if (roll < 0.72) distantSteps();
  else if (roll < 0.88) trySilhouette();
  else { presence.warpUntil = performance.now() / 1000 + 3.2; player.warp = 1; }
}
const presenceDim = { value: 1 };
function presenceFrame(dt, t) {
  for (const c of counters) {
    c.next -= dt;
    if (c.next <= 0) {
      c.next = 0.4 + Math.random() * 0.9;
      c.val -= 1 + Math.floor(Math.random() * 16);
      if (Math.random() < 0.07) c.val += 77;
      if (c.val < 0) c.val = 8000 + Math.floor(Math.random() * 1500);
      drawCounter(c);
      c.tex.needsUpdate = true;
    }
    c.glowU.value = 0.62 + Math.random() * 0.2;
  }
  if (presence.dimT >= 0) {
    presence.dimT += dt;
    const dtt = presence.dimT;
    presenceDim.value = dtt < 0.25 ? 1 - (dtt / 0.25) * 0.68
      : dtt < 1.0 ? 0.32
      : dtt < 2.0 ? 0.32 + ((dtt - 1.0) / 1.0) * 0.68 : 1;
    if (dtt >= 2.0) { presence.dimT = -1; presenceDim.value = 1; }
  }
  const warpLeft = presence.warpUntil - t;
  sharedLightUniforms.uWarpT.value = t;
  sharedLightUniforms.uWarp.value = warpLeft > 0 ? Math.sin(Math.min(1, (3.2 - warpLeft) / 0.8) * Math.PI * 0.5) * Math.min(1, warpLeft / 0.8) : 0;
  if (state !== 'play') return;
  if (postUniforms.uGlitch.value > 0 && state === 'play') {
    postUniforms.uGlitch.value = Math.max(0, postUniforms.uGlitch.value - dt * 1.4);
  }
  presence.nextAt -= dt * (regionAt(camera.position.x, camera.position.z) === 'hub' ? 0.45 : 1);
  if (presence.nextAt <= 0) {
    triggerPresence();
    presence.nextAt = 32 + Math.random() * 55;
  }
  if (presence.silhouette) {
    const sil = presence.silhouette;
    sil.life -= dt;
    animateRig(sil.rig, dt, { speed: 0, crouch: false, pitch: 0, carryPos: null, pointPos: null });
    const dx = sil.rig.root.position.x - camera.position.x;
    const dz = sil.rig.root.position.z - camera.position.z;
    const d = Math.hypot(dx, dz);
    const fwd = camForward(_v1);
    const dot = (dx * fwd.x + dz * fwd.z) / Math.max(d, 0.01);
    if (dot > 0.965) presence.watch += dt;
    else presence.watch = Math.max(0, presence.watch - dt * 2);
    if (presence.watch > 0.5) vanishSilhouette(true);
    else if (sil.life <= 0) vanishSilhouette(false);
  }
}

const SAMPLE_URLS = {

function auNoise(ctx2, dur) {
  const b = ctx2.createBuffer(1, Math.ceil(dur * 44100), 44100);
  const d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return b;
}
async function auRender(dur, build) {

    g.gain.setValueAtTime(0.5, 0.6); g.gain.linearRampToValueAtTime(0, 0.88);

    g.gain.setValueAtTime(1.6, 2.1); g.gain.linearRampToValueAtTime(0, 3.1);

      g.gain.linearRampToValueAtTime(0, 2.75);
      o.connect(lp); lp.connect(g); g.connect(c.destination); o.start();
    }

    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 300; bp.Q.value = 0.5;

    const g = c.createGain();
    for (let i = 0; i < 9; i++) {
      const t0 = i * 0.075;
      g.gain.setValueAtTime(Math.random() * 0.5, t0);
      g.gain.setValueAtTime(0.02, t0 + 0.03 + Math.random() * 0.03);

      o.connect(g); g.connect(c.destination); o.start();
    }

    src.connect(bp); bp.connect(g2); g2.connect(c.destination); src.start();
  });

async function auFetchSamples() {
  await Promise.all(Object.entries(SAMPLE_URLS).map(async ([k, u]) => {
    try {
      const r = await fetch(u);
      if (!r.ok) return;
      const ab = await r.arrayBuffer();
      AU.buffers[k] = await AU.ctx.decodeAudioData(ab);
      AU.fetched[k] = true;
      if (k === 'whisper') {
        const b = AU.buffers[k];
        const rb = AU.ctx.createBuffer(b.numberOfChannels, b.length, b.sampleRate);
        for (let ch = 0; ch < b.numberOfChannels; ch++) {
          const src2 = b.getChannelData(ch), dst = rb.getChannelData(ch);
          for (let i = 0; i < src2.length; i++) dst[i] = src2[src2.length - 1 - i];
        }
        AU.buffers.whisperRev = rb;
      }
    } catch (e) { /* fallback synth covers it */ }
  }));
}
function playBuf(name, { vol = 0.5, rate = 1, pan = 0, lp = 0, offset = 0, dur = 0 } = {}) {
  if (!AU.ready || !AU.buffers[name]) return null;
  const src = AU.ctx.createBufferSource();
  src.buffer = AU.buffers[name];
  src.playbackRate.value = rate;
  const g = AU.ctx.createGain();
  g.gain.value = vol;
  let node = src;
  if (lp > 0) {
    const f = AU.ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
    node.connect(f); node = f;
  }
  const p = AU.ctx.createStereoPanner();
  p.pan.value = pan;
  node.connect(g); g.connect(p); p.connect(AU.master);
  if (dur > 0) {
    // sliced playback gets a fade envelope — a raw cut clicks and sounds chopped
    const t0 = AU.ctx.currentTime, fade = Math.min(0.05, dur * 0.25);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + fade);
    g.gain.setValueAtTime(vol, t0 + dur / rate - fade);
    g.gain.linearRampToValueAtTime(0, t0 + dur / rate);
    src.start(0, offset, dur);
  } else src.start(0, offset);
  return src;
}
// offsets of the LOUD moments in a decoded buffer (skip silence between splashes)
function findLoudSpots(buf, win = 0.25, keep = 0.35) {
  const d = buf.getChannelData(0), sr = buf.sampleRate, w = Math.floor(win * sr);
  const spots = [];
  let max = 0;
  for (let i = 0; i + w < d.length; i += w) {
    let s = 0;
    for (let j = i; j < i + w; j += 8) s += d[j] * d[j];
    const rms = Math.sqrt(s / (w / 8));
    spots.push({ off: i / sr, rms });
    max = Math.max(max, rms);
  }
  const loud = spots.filter(s => s.rms > max * keep).map(s => s.off);
  return loud.length ? loud : [0];
}
function playSteps({ vol = 0.32, rate = 1, pan = 0, lp = 0 } = {}) {
  if (AU.fetched.steps) {
    const b = AU.buffers.steps;
    playBuf('steps', { vol, rate: rate * (0.92 + Math.random() * 0.16), pan, lp, offset: Math.random() * Math.max(0.1, b.duration - 0.45), dur: 0.38 });
  } else {
    playBuf('thud', { vol: vol * 0.55, rate: 1.5 + Math.random() * 0.5, pan, lp });
  }
}
function playWaterStep(vol) {
  // slices of a real splashing recording, but only from its LOUD moments
  if (AU.fetched.wsteps) {
    if (!AU.wstepsSpots) AU.wstepsSpots = findLoudSpots(AU.buffers.wsteps);
    const off = AU.wstepsSpots[Math.floor(Math.random() * AU.wstepsSpots.length)];
    playBuf('wsteps', { vol, rate: 0.9 + Math.random() * 0.25, offset: off, dur: 0.4 });
  } else {
    playBuf('splash', { vol, rate: 0.85 + Math.random() * 0.25 });
  }
}
function playWhisper(pan) {
  if (AU.fetched.whisper) {
    playBuf(Math.random() < 0.5 ? 'whisper' : 'whisperRev', { vol: 0.34, rate: 0.52 + Math.random() * 0.12, pan, lp: 1400 });
    setTimeout(() => playBuf('whisperRev', { vol: 0.2, rate: 0.45, pan: -pan * 0.6, lp: 1000 }), 460);
  } else {
    playBuf('breath', { vol: 0.4, rate: 1.35, pan, lp: 1200 });
  }
}
function playKnock(pan) {
  if (AU.fetched.knock) {
    const b = AU.buffers.knock;
    playBuf('knock', { vol: 0.26, rate: 0.9, pan, lp: 650, offset: Math.random() * Math.max(0.1, b.duration - 1.6), dur: 1.4 });
  } else {
    playBuf('thud', { vol: 0.3, rate: 0.8, pan, lp: 500 });
    setTimeout(() => playBuf('thud', { vol: 0.24, rate: 0.85, pan, lp: 500 }), 260);

}
async function audioInit() {
  if (AU.ctx) return;
  AU.ctx = new (window.AudioContext || window.webkitAudioContext)();
  AU.master = AU.ctx.createGain();
  AU.master.gain.value = prefVol / 100;
  AU.master.connect(AU.ctx.destination);
  await auSynthAll();
  await auFetchSamples();
  const humSrc = AU.ctx.createBufferSource();
  humSrc.buffer = AU.buffers.hum || AU.buffers.humSynth;
  humSrc.loop = true;
  const lp = AU.ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 850;
  AU.humGain = AU.ctx.createGain();
  AU.humGain.gain.value = 0.05;
  humSrc.connect(lp); lp.connect(AU.humGain); AU.humGain.connect(AU.master);
  humSrc.start();
  AU.ready = true;
}
window.addEventListener('pointerdown', () => { audioInit(); }, { once: true });
let stepPhasePrev = 0;
function audioFrame(dt) {
  if (!AU.ready) return;
  const flick = 0.62 + 0.38 * flickerGlow.value;
  AU.humGain.gain.value = 0.05 * flick * presenceDim.value * (state === 'menu' ? 1.4 : 1);
  const moving = Math.hypot(player.vel.x, player.vel.z) > 0.6;
  if (state === 'play' && locked && moving && player.grounded) {
    const ph = Math.floor(player.bobPhase / Math.PI);
    if (ph !== stepPhasePrev) {
      stepPhasePrev = ph;
      const ft2 = charBody.translation();
      const inWater = FLOOD && (ft2.y - CAPS_CENTER) < FLOOD.waterY - 0.05
        && regionAt(ft2.x, ft2.z) === 'flood';
      if (inWater) playWaterStep(0.4);
      else playSteps({ vol: player.crouching ? 0.1 : player.sprinting ? 0.4 : 0.24, rate: player.sprinting ? 1.12 : 1 });
    }
  }
}

  const st = {

  ownRig.root.position.set(ft.x, feetY, ft.z);

// hub mirror — off-axis portal projection: image is pinned to the glass
// rectangle, so it mirrors correctly instead of rotating with the viewer
const MIRRORS = [];
const mirror = { active: false }; // the hub mirror (kept as a named handle)
function makeMirror(MX, MZ, MHW, MY0, MY1, into = { active: false }) {
  const m = into;
  m.frame = staticMesh(boxGeo(0.07, MY1 - MY0 + 0.14, MHW * 2 + 0.14, MX - 0.035, (MY0 + MY1) / 2, MZ), matWood);
  m.rt = new THREE.WebGLRenderTarget(192, 320, {
    minFilter: THREE.NearestFilter, magFilter: THREE.NearestFilter,
  });
  m.cam = new THREE.PerspectiveCamera(68, (MHW * 2) / (MY1 - MY0), 0.07, 45);
  m.cam.layers.enable(0);
  m.cam.layers.enable(2);
  m.cam.rotation.set(0, -Math.PI / 2, 0);
  const glassGeo = new THREE.PlaneGeometry(MHW * 2, MY1 - MY0);
  const guv = glassGeo.attributes.uv;
  for (let i = 0; i < guv.count; i++) guv.setX(i, 1 - guv.getX(i));
  m.glass = new THREE.Mesh(glassGeo, psxEmissive(m.rt.texture, { value: 0.85 }));
  m.glass.position.set(MX + 0.002, (MY0 + MY1) / 2, MZ);
  m.glass.rotation.y = Math.PI / 2;
  scene.add(m.glass);
  Object.assign(m, { x: MX, z: MZ, hw: MHW, y0: MY0, y1: MY1, ready: true });
  MIRRORS.push(m);
  return m;
}
function initMirror() {
  makeMirror(-31.9, -5, 0.6, 0.12, 2.12, mirror);
}
function updateMirror() {
  for (const m of MIRRORS) {
    if (!m.ready) { m.active = false; continue; }
    const dx = camera.position.x - m.x, dz = camera.position.z - m.z;
    m.active = state !== 'menu' && dx > 0.15 && dx < 8 && Math.abs(dz) < 6;
    if (!m.active) continue;
    m.cam.position.set(2 * m.x - camera.position.x, camera.position.y, camera.position.z);
    const near = 0.07, s = near / dx;
    m.cam.projectionMatrix.makePerspective(
      (m.z - m.hw - camera.position.z) * s,
      (m.z + m.hw - camera.position.z) * s,
      (m.y1 - camera.position.y) * s,
      (m.y0 - camera.position.y) * s,
      near, 45
    );
    m.cam.projectionMatrixInverse.copy(m.cam.projectionMatrix).invert();
    m.glass.visible = false;
    m.frame.visible = false;
    renderer.setRenderTarget(m.rt);
    renderer.render(scene, m.cam);
    renderer.setRenderTarget(null);
    m.glass.visible = true;
    m.frame.visible = true;
  }
}

function netFixed() {
  if (!session || !session.started) return;
  netTick++;
  if (session.isHost) {
    for (const peer of session.peers.values()) {
      if (!peer.input || !peer.kinBody) continue;
      const c = peer.kinBody.translation();
      const tx = peer.input.p[0], ty = peer.input.p[1] + CAPS_CENTER, tz = peer.input.p[2];
      peer.kinBody.setNextKinematicTranslation({
        x: c.x + (tx - c.x) * 0.5, y: c.y + (ty - c.y) * 0.5, z: c.z + (tz - c.z) * 0.5,
      });
      peer.lastPos = peer.input.p;
      const rp = netPlayers.get(peer.id);
      if (rp) {
        rp.t.set(peer.input.p[0], peer.input.p[1], peer.input.p[2]);
        rp.yaw = peer.input.yaw; rp.pitch = peer.input.pitch;
        rp.crouch = !!(peer.input.c & 1); rp.sit = !!(peer.input.c & 2);
        rp.heldNid = peer.grabProp?.nid || 0;
      }
      stepGuestGrab(peer);
    }
    if (netTick % 3 === 0) {
      const ft = charBody.translation();
      const myFlags = (player.crouching ? 1 : 0) | (seat.prop ? 2 : 0);
      const pl = [[session.me.id, r3(ft.x), r3(ft.y - CAPS_CENTER), r3(ft.z), r3(player.yaw), r3(player.pitch), myFlags, grab.prop?.nid || 0]];
      for (const peer of session.peers.values()) {
        if (peer.lastPos) pl.push([peer.id, peer.lastPos[0], peer.lastPos[1], peer.lastPos[2], peer.input?.yaw || 0, peer.input?.pitch || 0, peer.input?.c || 0, peer.grabProp?.nid || 0]);
      }
      const pr = [];
      for (const p of props) {
        if (p.roomIdx > 0 && ROOMS[p.roomIdx]?.frozen) continue;
        const held = grab.prop === p || [...session.peers.values()].some(p2 => p2.grabProp === p);
        // Keep streaming for a few snapshots AFTER a body sleeps so the guest's
        // interpolation converges onto the exact resting pose (else it desyncs).
        if (!p.body.isSleeping() || held) p._linger = 10;
        else if (p._linger > 0) p._linger--;
        else continue;
        const t = p.body.translation(), q = p.body.rotation();
        pr.push([p.nid, r3(t.x), r3(t.y), r3(t.z), r3(q.x), r3(q.y), r3(q.z), r3(q.w)]);
      }
      const sn = JSON.stringify({ t: 'sn', pl, pr });
      for (const peer of session.peers.values()) {
        if (peer.chSt?.readyState === 'open') peer.chSt.send(sn);
      }
    }
  } else {
    if (netSnap) {
      for (const e of netSnap.pr) {
        const p = nidMap.get(e[0]);
        if (!p) continue;
        const bt = p.body.translation();
        p.body.setNextKinematicTranslation({
          x: bt.x + (e[1] - bt.x) * 0.4, y: bt.y + (e[2] - bt.y) * 0.4, z: bt.z + (e[3] - bt.z) * 0.4,
        });
        const br2 = p.body.rotation();
        _q1.set(br2.x, br2.y, br2.z, br2.w).slerp(_q2.set(e[4], e[5], e[6], e[7]), 0.4);
        p.body.setNextKinematicRotation({ x: _q1.x, y: _q1.y, z: _q1.z, w: _q1.w });
      }
      for (const e of netSnap.pl) {
        if (e[0] === session.me.id) continue;
        const rp = netPlayers.get(e[0]);
        if (rp) {
          rp.t.set(e[1], e[2], e[3]);
          rp.yaw = e[4]; rp.pitch = e[5];
          rp.crouch = !!(e[6] & 1); rp.sit = !!(e[6] & 2);
          rp.heldNid = e[7] || 0;
        }
      }
    }
    if (netTick % 3 === 0 && session.host?.chSt?.readyState === 'open') {
      const ft = charBody.translation();
      const msg = {
        t: 'in',
        p: [r3(ft.x), r3(ft.y - CAPS_CENTER), r3(ft.z)],
        yaw: r3(player.yaw), pitch: r3(player.pitch), tp: 0,
        c: (player.crouching ? 1 : 0) | (seat.prop ? 2 : 0),
      };
      if (grab.prop) {
        const tp2 = camForward(_v1).multiplyScalar(grab.holdDist).add(camera.position);
        msg.tp = [r3(tp2.x), r3(tp2.y), r3(tp2.z)];
      }
      session.host.chSt.send(JSON.stringify(msg));
    }
  }
}
function netFrame(dt) {
  const now = performance.now() / 1000;
  for (const rp of netPlayers.values()) {
    rp.sPrev.copy(rp.s);
    rp.s.lerp(rp.t, 1 - Math.exp(-14 * dt));
    rp.mesh.position.copy(rp.s);
    const dy2 = rp.yaw - rp.mesh.rotation.y;
    rp.mesh.rotation.y += Math.atan2(Math.sin(dy2), Math.cos(dy2)) * Math.min(1, 12 * dt);
    const speed = dt > 0 ? rp.s.distanceTo(rp.sPrev) / dt : 0;
    const heldProp = rp.heldNid ? nidMap.get(rp.heldNid) : null;
    animateRig(rp.rig, dt, {
      speed,
      crouch: rp.crouch,
      sit: rp.sit,
      pitch: rp.pitch,
      carryPos: heldProp ? heldProp.mesh.position : null,
      pointPos: rp.pointUntil > now ? rp.pointPos : null,
    });
    const d = rp.s.distanceTo(camera.position);
    rp.nickMesh.visible = d < 8;
    if (rp.nickMesh.visible) {
      rp.nickMesh.rotation.y = Math.atan2(camera.position.x - rp.s.x, camera.position.z - rp.s.z) - rp.mesh.rotation.y;
    }
  }
  updatePings(dt, now);
  updateOwnBody(dt);
}

// signaling adapters
function makeLocalSignal(code, id) {
  const bc = new BroadcastChannel('brl-' + code);
  const subs = [];
  bc.onmessage = e => { const m = e.data; if (m && m.to === id) subs.forEach(f => f(m)); };
  return {
    send(to, msg) { bc.postMessage({ ...msg, to }); },
    on(f) { subs.push(f); },
    close() { try { bc.close(); } catch {} },
  };
}
let fbCtx = null;
async function fbInit() {
  if (fbCtx) return fbCtx;
  const appM = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const dbM = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
  const app = appM.initializeApp(FIREBASE_CONFIG);
  fbCtx = { m: dbM, db: dbM.getDatabase(app) };
  return fbCtx;
}
async function makeFirebaseSignal(code, id) {
  const { m, db } = await fbInit();
  const subs = [];
  m.onChildAdded(m.ref(db, `rooms/${code}/inbox/${id}`), snap => {
    const v = snap.val();
    m.remove(snap.ref);
    subs.forEach(f => f(v));
  });
  if (id === 'host') {
    m.set(m.ref(db, `rooms/${code}/meta`), { created: m.serverTimestamp() });
    m.onDisconnect(m.ref(db, `rooms/${code}`)).remove();
  }
  return {
    send(to, msg) { m.push(m.ref(db, `rooms/${code}/inbox/${to}`), msg); },
    on(f) { subs.push(f); },
    close() { if (id === 'host') m.remove(m.ref(db, `rooms/${code}`)); },
  };
}
async function makeSignal(code, id) {
  return FIREBASE_CONFIG ? makeFirebaseSignal(code, id) : makeLocalSignal(code, id);
}

async function hostSignal(m) {
  if (!session?.isHost) return;
  if (m.type === 'offer') {
    const peer = createPeerShell(m.from);
    session.peers.set(m.from, peer);
    peer.pc = new RTCPeerConnection(RTC_CFG);
    peer.pc.onicecandidate = e => { if (e.candidate) session.sig.send(m.from, { from: 'host', type: 'ice', payload: e.candidate.toJSON() }); };
    peer.pc.onconnectionstatechange = () => {
      if (['failed', 'disconnected', 'closed'].includes(peer.pc.connectionState)) peerLost(peer);
    };
    peer.pc.ondatachannel = e => {
      const ch = e.channel;
      if (ch.label === 'ev') {
        peer.chEv = ch;
        ch.onmessage = ev2 => hostEvMsg(peer, JSON.parse(ev2.data));
      } else if (ch.label === 'st') {
        peer.chSt = ch;
        ch.onmessage = ev2 => { peer.input = JSON.parse(ev2.data); };
      }
    };
    await peer.pc.setRemoteDescription(m.payload);
    const ans = await peer.pc.createAnswer();
    await peer.pc.setLocalDescription(ans);
    session.sig.send(m.from, { from: 'host', type: 'answer', payload: { type: ans.type, sdp: ans.sdp } });
  } else if (m.type === 'ice') {
    session.peers.get(m.from)?.pc?.addIceCandidate(m.payload).catch(() => {});
  }
}
function hostEvMsg(peer, m) {
  switch (m.t) {
    case 'hello':
      peer.nick = (m.nick || '???').slice(0, 12);
      peer.color = takenColors(peer.id).has(m.color) ? firstFreeColor(peer.id) : m.color;
      refreshPlayersInfo();
      if (!session.started) showToast(S.netPlayerJoined(peer.nick));
      else {
        // mid-run (re)join: hand the wallet back, start them, sync the world
        walletSet(peer.id, orphanGold.get(peer.nick) || 0);
        orphanGold.delete(peer.nick);
        peer.started = true;
        peer.kinBody = world.createRigidBody(
          RAPIER.RigidBodyDesc.kinematicPositionBased().setTranslation(spawnX, CAPS_CENTER, spawnZ)
        );
        world.createCollider(RAPIER.ColliderDesc.capsule(CAPS_HALF, CAPS_R).setFriction(0.1), peer.kinBody);
        addRemotePlayer({ id: peer.id, nick: peer.nick, color: peer.color });
        peer.sendEv({ t: 'start', settings: session.settings });
        peer.sendEv({ t: 'sync', pack: buildSyncPack(peer.id) });
        showToast(S.netPlayerJoined(peer.nick));
      }
      break;
    case 'setReady': peer.ready = !!m.v; refreshPlayersInfo(); break;
    case 'setNick': peer.nick = (m.n || '???').slice(0, 12); refreshPlayersInfo(); break;
    case 'setColor':
      if (!takenColors(peer.id).has(m.c)) { peer.color = m.c; refreshPlayersInfo(); }
      else peer.sendEv({ t: 'ev', ev: { k: 'colorTaken', pid: peer.id } });
      break;
    case 'wantStart': tryStartCountdownLaunch(); break;
    case 'intent': handleIntent(peer, m.m); break;
    case 'bye': peerLost(peer); break;
  }
}
async function joinRoom(code) {
  const id = 'g' + Math.random().toString(16).slice(2, 9);

    isHost: false, code, sig,
    me: { id, nick: myNick, color: myColor, ready: false },
    peers: new Map(), playersInfo: [], settings: null,
    started: false, host: null,
  };
  const pc = new RTCPeerConnection(RTC_CFG);
  const chEv = pc.createDataChannel('ev');

  session.host = {

    sendEv(o) { if (chEv.readyState === 'open') chEv.send(JSON.stringify(o)); },

  chEv.onmessage = e => guestEvMsg(JSON.parse(e.data));

  pc.onicecandidate = e => { if (e.candidate) sig.send('host', { from: id, type: 'ice', payload: e.candidate.toJSON() }); };
  pc.onconnectionstatechange = () => {
    if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) hostLost();
  };
  sig.on(async m => {
    if (m.type === 'answer') await pc.setRemoteDescription(m.payload).catch(() => {});
    else if (m.type === 'ice') pc.addIceCandidate(m.payload).catch(() => {});
  });

  document.getElementById('m-joinmsg').textContent = S.connecting;

function peerLost(peer) {

function updatePhotoCam(dt) {
  const fwd = _v3.set(-Math.sin(photo.yaw), 0, -Math.cos(photo.yaw));
  const sp = (keys.ShiftLeft || keys.ShiftRight ? 7 : 3.2) * dt;
  if (keys.KeyW) { photo.x += fwd.x * sp; photo.z += fwd.z * sp; }
  if (keys.KeyS) { photo.x -= fwd.x * sp; photo.z -= fwd.z * sp; }
  if (keys.KeyD) { photo.x -= fwd.z * sp; photo.z += fwd.x * sp; }
  if (keys.KeyA) { photo.x += fwd.z * sp; photo.z -= fwd.x * sp; }
  if (keys.Space) photo.y += sp;
  if (keys.ControlLeft || keys.ControlRight) photo.y = Math.max(0.2, photo.y - sp);
  camera.position.set(photo.x, photo.y, photo.z);
  camera.rotation.order = 'YXZ';
  camera.rotation.set(photo.pitch, photo.yaw, 0);

function applySyncPack(pk) {
  pk.doors.forEach((o, i) => { if (o && doors[i] && !doors[i].open) openDoor(doors[i]); });

//======================================================================
// MAIN LOOP — fixed-step physics + render
//======================================================================
let last = performance.now(), acc = 0;
let fpsAcc = 0, fpsN = 0, fpsClock = 0;
let manualTick = false;
function loop(now) {
  if (!manualTick) requestAnimationFrame(loop);
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.1) dt = 0.1;
  const t = now / 1000;

  postUniforms.uTime.value = t;
  updateFlicker(t, dt);

  acc += dt;
  if (worldBuilt) {
    let sub = 0;
    while (acc >= CFG.step && sub < 3) {
      if (seat.prop) stepSeated();
      else if (state === 'play' && locked) stepPlayer(CFG.step);
      netFixed();
      stepGrab();
      world.step();
      syncMeshes();
      checkRespawns();
      acc -= CFG.step;
      sub++;
    }
    if (sub === 3) acc = 0;
  } else acc = 0;

  if (state === 'menu') updateMenuCam(dt);
  else if (state === 'intro') updateIntro(dt);
  else if (state === 'photo') updatePhotoCam(dt);
  else updateCamera(dt);

  // Safety net: whenever we're in-world but the pointer isn't locked, keep a
  // clickable overlay up so lock can always be (re)acquired via a gesture.
  if (((state === 'play' || state === 'photo') && !locked && !uiOpen) || state === 'wait') {
    if (!pauseEl.classList.contains('show')) {
      if (state === 'wait') showEnterPrompt();
      else {
        pauseEl.querySelector('h2').textContent = S.paused;
        pauseEl.querySelector('p').textContent = S.resume;
        resetPauseSol();
        pauseEl.classList.add('show');
      }
    }
  } else if (state !== 'wait' && locked) {
    pauseEl.classList.remove('show');
  }

  gameplayFrame(dt, t);
  netFrame(dt);
  audioFrame(dt);
  updatePrompt();

  updateMirror();
  renderer.setRenderTarget(rt);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
  postUniforms.tScene.value = rt.texture;
  renderer.render(postScene, postCam);

  fpsAcc += dt; fpsN++; fpsClock += dt;
  if (fpsClock >= 0.5) {
    let awake = 0;
    for (const p of props) if (!p.body.isSleeping()) awake++;
    fpsEl.textContent = `${Math.round(fpsN / fpsAcc)} FPS · ${awake} AWAKE`;
    fpsAcc = 0; fpsN = 0; fpsClock = 0;
  }
}
requestAnimationFrame(loop);

// background-tab heartbeat: browsers pause rAF in hidden tabs, which used to
// freeze the whole co-op when the HOST switched tabs — a Worker keeps ticking
try {
  const bgWorker = new Worker(URL.createObjectURL(
    new Blob(['setInterval(function(){postMessage(1)},33)'], { type: 'text/javascript' })
  ));
  bgWorker.onmessage = () => {
    if (document.hidden && worldBuilt) {
      manualTick = true;
      loop(performance.now());
      manualTick = false;
    }
  };
} catch (e) { /* no Worker → backgrounded tab simply slows down */ }

// debug hooks (used for automated verification during development)
window.__br = {
  props, player, grab, tryGrab, releaseGrab, doors, gate, safe, coins,
  world, RAPIER, raycastProp, camera, camForward, nidMap,
  shopState, setGold, openShop, openKeypad, kpPress, findInteract, keypadTargets,
  insertKey, openDoor, performDoor, performKeypad, attemptBuy, applyEvent,
  buildWorld, rooms: () => ROOMS, grid: () => GRID, doFlash, hideCoin,
  hostRoom, joinRoom, startGame, setLanguage, netPlayers, addRemotePlayer,
  presence, triggerPresence, trySilhouette, lightsDip, doPing, AU, audioInit,
  sitOn, standUp, seat, wallets, walletSet, walletGet, performBuy,
  MACH, performMachine, setMachine, performEnd, seatAnchor, openGate, endGame,
  lights: () => ({ count: lightCount, max: MAXL }),
  driveCar, keys, runPlayerColors,
  togglePhoto, photo, collectSave, applySave, buildSyncPack, applySyncPack,
  MIRRORS, refreshContinueBtn,
  renderer, rtInfo: () => {
    const v = new THREE.Vector4();
    renderer.getViewport(v);
    const s = new THREE.Vector2();
    renderer.getSize(s);
    return { viewport: [v.x, v.y, v.z, v.w], size: [s.x, s.y], rt: [rt.width, rt.height], canvas: [renderer.domElement.width, renderer.domElement.height] };
  },
  mirror, makeRig, animateRig, applyCosmetic, attemptBuy: (id) => attemptBuy(id),
  session: () => session,
  async netSelfTest() {
    const a = new RTCPeerConnection(), b = new RTCPeerConnection();
    const ch = a.createDataChannel('t');
    const done = new Promise(res => {
      b.ondatachannel = e => { e.channel.onmessage = ev => res(ev.data); };
      ch.onopen = () => ch.send('rtc-ok');
    });
    a.onicecandidate = e => e.candidate && b.addIceCandidate(e.candidate).catch(() => {});
    b.onicecandidate = e => e.candidate && a.addIceCandidate(e.candidate).catch(() => {});
    const o = await a.createOffer(); await a.setLocalDescription(o); await b.setRemoteDescription(o);
    const an = await b.createAnswer(); await b.setLocalDescription(an); await a.setRemoteDescription(an);
    const r = await Promise.race([done, new Promise(res => setTimeout(() => res('timeout'), 6000))]);
    a.close(); b.close();
    return r;
  },
  setView(x, z, yaw, pitch) {
    charBody.setTranslation({ x, y: CAPS_CENTER, z }, true);
    player.yaw = yaw; player.pitch = pitch;
    camera.position.set(x, CFG.eyeStand, z);
    camera.rotation.order = 'YXZ';
    camera.rotation.set(pitch, yaw, 0);
  },
  aimAt(x, y, z) {
    const dx = x - camera.position.x, dy = y - camera.position.y, dz = z - camera.position.z;
    player.yaw = Math.atan2(-dx, -dz);
    player.pitch = Math.atan2(dy, Math.hypot(dx, dz));
    camera.rotation.set(player.pitch, player.yaw, 0);
  },
  skipIntro() {
    state = 'play';
    overlayEl.classList.add('hidden');
    postUniforms.uGlitch.value = 0;
    updateCamera(0.016);
  },
  awake: () => props.filter(p => !p.body.isSleeping()).length,
  state: () => state,
  region: () => regionAt(camera.position.x, camera.position.z),
  tick(n = 1) {
    manualTick = true;
    for (let i = 0; i < n; i++) loop(last + 16.7);
    manualTick = false;
  },
};

const fontLink = document.createElement('link');
fontLink.rel = 'stylesheet';
fontLink.href = 'https://fonts.googleapis.com/css2?family=VT323&display=swap';
document.head.appendChild(fontLink);
</script>
