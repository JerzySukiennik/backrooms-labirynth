  #subtitle {

  #prompt {

    transform: scale(2.1);
    background: rgba(245,232,170,0.95);
  }
  #action {
    position: absolute; left: 50%; bottom: 12%; transform: translateX(-50%);

    text-shadow: 1px 1px 0 #000; white-space: nowrap;
  }
  #fps {
    position: absolute; top: 10px; right: 12px; font-size: 16px;

    text-shadow: 1px 1px 0 #000; text-align: right;
  }
  #gold {
    position: absolute; top: 12px; left: 14px; font-size: 22px;
    letter-spacing: 0.15em; color: rgba(232,214,138,0.9);
    text-shadow: 1px 1px 0 #000; display: none;
    transition: transform 0.15s ease;

  #gold.bump { transform: scale(1.35); }
  #keys {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);

    border: 2px solid; opacity: 0.9; background: transparent;
    box-shadow: 0 0 5px rgba(0,0,0,0.8);

    position: absolute; left: 50%; top: 62%; transform: translateX(-50%);

    text-shadow: 1px 1px 0 #000; opacity: 0; transition: opacity 0.3s ease;
    white-space: nowrap;
  }

    position: fixed; inset: 0; display: none; z-index: 20;

    background: rgba(0,0,0,0.72);

  .m-screen { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  .m-btn { min-width: 320px; margin-top: 0; }
  #m-note { margin-top: 18px; font-size: 14px; letter-spacing: 0.18em; color: #6a5c30; }

function makeCanvas(size, draw) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  draw(g, size);
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
let seed = 1337;
function rnd() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

function noiseOver(g, s, amount) {
  const img = g.getImageData(0, 0, s, s), d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (rnd() * 2 - 1) * amount;
    d[i] += n; d[i + 1] += n; d[i + 2] += n * 0.7;
  }
  g.putImageData(img, 0, 0);
}
function stains(g, s, count, rMin, rMax, tone, aMax) {
  for (let i = 0; i < count; i++) {
    const x = rnd() * s, y = rnd() * s, r = rMin + rnd() * (rMax - rMin);
    const gr = g.createRadialGradient(x, y, 0, x, y, r);
    gr.addColorStop(0, `rgba(${tone},${(0.04 + rnd() * aMax).toFixed(3)})`);
    gr.addColorStop(1, `rgba(${tone},0)`);
    g.fillStyle = gr;
    g.fillRect(x - r, y - r, r * 2, r * 2);
  }
}

function makeTextTexture(lines, { lineH = 58, font = 'bold 38px monospace', color = '#e9dc9a', glow = 'rgba(233,220,154,0.5)' } = {}) {

  const w = Math.ceil(Math.max(...lines.map(ln => meas.measureText(ln).width))) + 48;
  c.width = w; c.height = lines.length * lineH + 26;
  const g = c.getContext('2d');
  g.font = font; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = glow; g.shadowBlur = 12;

  lines.forEach((ln, i) => g.fillText(ln, w / 2, 24 + i * lineH));
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
  t.colorSpace = THREE.SRGBColorSpace;
  return { tex: t, aspect: c.width / c.height };
}

//======================================================================
const NUM_LIGHTS = LIGHT_CELLS.length;

const psxVertex = /* glsl */`
  uniform float uSnap;
  uniform vec3 uLightPos[${NUM_LIGHTS}];
  uniform vec3 uLightColor[${NUM_LIGHTS}];
  uniform float uLightIntensity[${NUM_LIGHTS}];
  uniform vec3 uSpotPos[2];
  uniform vec3 uSpotDir[2];
  uniform vec3 uSpotCol[2];
  uniform vec4 uSpotP[2];
  uniform vec3 uAmbient;
  uniform float uFogDensity;
  uniform float uWarp;
  uniform float uWarpT;
  varying vec2 vUvW;
  varying float vW;
  varying vec3 vLight;
  varying float vFog;
  void main() {
    vec3 wp = (modelMatrix * vec4(position, 1.0)).xyz;
    vec3 n = normalize(mat3(modelMatrix) * normal);
    vec3 posW = position;
    if (uWarp > 0.001) {
      posW += normal * sin(wp.z * 0.7 + wp.x * 0.5 + uWarpT * 1.5) * sin(wp.y * 2.2 + uWarpT) * uWarp * 0.055;
    }
    vec3 acc = uAmbient;
    for (int i = 0; i < ${NUM_LIGHTS}; i++) {
      vec3 toL = uLightPos[i] - wp;
      float d = length(toL);
      float nd = max(dot(n, toL / max(d, 0.001)), 0.0);
      float att = uLightIntensity[i] * 1.5 / (1.0 + 0.10 * d * d);
      att *= smoothstep(${LIGHT_RANGE.toFixed(1)}, ${(LIGHT_RANGE * 0.4).toFixed(1)}, d);
      acc += uLightColor[i] * (nd * 0.7 + 0.3) * att;
    }
    for (int i = 0; i < 2; i++) {
      if (uSpotP[i].z > 0.5) {
        vec3 toS = uSpotPos[i] - wp;
        float d = length(toS);
        vec3 L = toS / max(d, 0.001);
        float cone = smoothstep(uSpotP[i].x, uSpotP[i].y, dot(-L, uSpotDir[i]));
        float att = 1.0 / (1.0 + 0.055 * d * d);
        acc += uSpotCol[i] * (max(dot(n, L), 0.0) * 0.6 + 0.4) * cone * att;
      }
    }
    vLight = acc;

const psxEmissiveVertex = /* glsl */`
  uniform float uSnap;

  void main() {

    vFog = 1.0 - exp(-uFogDensity * uFogDensity * dot(mv.xyz, mv.xyz));

const psxEmissiveFragment = /* glsl */`
  uniform sampler2D map;

const psxFragmentAlpha = /* glsl */`
  uniform sampler2D map;
  uniform vec3 uFogColor;
  varying vec2 vUvW;
  varying float vW;

  varying float vFog;
  void main() {

`;
const psxSpriteFragment = /* glsl */`
  uniform sampler2D map;
  uniform vec3 uFogColor;
  uniform float uGlow;
  varying vec2 vUvW;
  varying float vW;
  varying float vFog;
  void main() {

const uvDecalVertex = /* glsl */`
  uniform float uSnap;

  varying float vW;
  varying float vReveal;

function wallQuad(x0, y0, z0, x1, y1, z1, nx, nz, segs) {
  const w = Math.hypot(x1 - x0, z1 - z0), h = y1 - y0;
  const geo = new THREE.PlaneGeometry(w, h, segs, 5);
  const m = new THREE.Matrix4();
  const yaw = Math.atan2(nx, nz);
  m.makeRotationY(yaw);
  m.setPosition((x0 + x1) / 2, (y0 + y1) / 2, (z0 + z1) / 2);
  geo.applyMatrix4(m);
  return geo;
}
function remapWallUV(geo) {
  const pos = geo.attributes.position, nrm = geo.attributes.normal, uv = geo.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    const nx = nrm.getX(i), y = pos.getY(i);
    const along = Math.abs(nx) > 0.5 ? pos.getZ(i) : pos.getX(i);
    uv.setXY(i, along / CFG.cell, y / CFG.wallH);
  }
  uv.needsUpdate = true;
}
function remapFlatUV(geo, scale) {
  const pos = geo.attributes.position, uv = geo.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    uv.setXY(i, pos.getX(i) / scale, pos.getZ(i) / scale);
  }
  uv.needsUpdate = true;
}

const wallGeos = [], H = CFG.wallH, C = CFG.cell;
for (let cz = 0; cz < MH; cz++) {
  for (let cx = 0; cx < MW; cx++) {
    const c = cellAt(cx, cz);
    const [wx, wz] = cellToWorld(cx, cz);
    if (c === '#') {
      const x0 = wx - C / 2, x1 = wx + C / 2, z0 = wz - C / 2, z1 = wz + C / 2;
      if (cellAt(cx, cz - 1) !== '#') wallGeos.push(wallQuad(x0, 0, z0, x1, H, z0, 0, -1, 4));
      if (cellAt(cx, cz + 1) !== '#') wallGeos.push(wallQuad(x1, 0, z1, x0, H, z1, 0, 1, 4));
      if (cellAt(cx - 1, cz) !== '#') wallGeos.push(wallQuad(x0, 0, z1, x0, H, z0, -1, 0, 4));
      if (cellAt(cx + 1, cz) !== '#') wallGeos.push(wallQuad(x1, 0, z0, x1, H, z1, 1, 0, 4));
    } else if (c === 'P') {
      const r = 0.45;
      wallGeos.push(wallQuad(wx - r, 0, wz - r, wx + r, H, wz - r, 0, -1, 2));
      wallGeos.push(wallQuad(wx + r, 0, wz + r, wx - r, H, wz + r, 0, 1, 2));
      wallGeos.push(wallQuad(wx - r, 0, wz + r, wx - r, H, wz - r, -1, 0, 2));
      wallGeos.push(wallQuad(wx + r, 0, wz - r, wx + r, H, wz + r, 1, 0, 2));
    }
  }
}

function protoMesh(parts) {
  const group = new THREE.Group();
  const byMat = new Map();
  for (const p of parts) {
    if (!byMat.has(p.mat)) byMat.set(p.mat, []);
    byMat.get(p.mat).push(boxGeo(...p.box));
  }
  for (const [mat, geos] of byMat) {
    group.add(new THREE.Mesh(mergeGeometries(geos), mat));
  }
  return group;
}

const props = [];
function spawnProp(f) {
  const T = TYPES[f.type];
  let [wx, wz] = f.at ? f.at : cellToWorld(...f.cell);
  wx += f.dx || 0; wz += f.dz || 0;
  const y = f.lift || 0.001;
  const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, f.rot, 0));
  const desc = RAPIER.RigidBodyDesc.dynamic()
    .setTranslation(wx, y, wz)
    .setRotation({ x: q.x, y: q.y, z: q.z, w: q.w })
    .setLinearDamping(0.12)
    .setAngularDamping(0.5);
  if (T.ccd) desc.setCcdEnabled(true);
  const body = world.createRigidBody(desc);
  for (const cd of T.colliders) {
    world.createCollider(
      RAPIER.ColliderDesc.cuboid(...cd.half)
        .setTranslation(...cd.at)
        .setFriction(0.6)
        .setRestitution(0.05)
        .setMass(T.mass / T.colliders.length),
      body
    );
  }
  const mesh = T.proto.clone();
  mesh.position.set(wx, y, wz);
  mesh.quaternion.copy(q);
  scene.add(mesh);
  const prop = {
    body, mesh, type: f.type, mass: T.mass,
    keyColor: T.keyColor || null,
    isLight: T.isLight || null,
    isCoin: !!T.isCoin,
    hintRegion: f.hint || null,
    noteIdx: f.note !== undefined ? f.note : null,
    lightOn: false,
    nid: nextNid++,
    home: { x: wx, y: f.lift || 0.001, z: wz, q },
  };
  props.push(prop);
  bodyToProp.set(body.handle, prop);
  nidMap.set(prop.nid, prop);
  return prop;
}
const bodyToProp = new Map();
const nidMap = new Map();
let nextNid = 1;
for (const f of FURNITURE) spawnProp(f);
function removeProp(p) {
  if (grab.prop === p) releaseGrab(false);
  world.removeRigidBody(p.body);

}

function staticMesh(geo, mat) { const m = new THREE.Mesh(geo, mat); scene.add(m); return m; }

const doors = [];
function buildDoor(cx, cz, axis, color) {
  const [wx, wz] = cellToWorld(cx, cz);
  const TH = CFG.wallH, postW = 0.55, opening = 2 - postW * 2;
  const along = axis === 'x' ? 'z' : 'x';
  const post = (off) => {
    const size = axis === 'x' ? [1.2, TH, postW] : [postW, TH, 1.2];
    const pos = axis === 'x' ? [wx, TH / 2, wz + off] : [wx + off, TH / 2, wz];
    staticMesh(boxGeo(...size, ...pos), matFrame);
    staticCuboid(size[0] / 2, size[1] / 2, size[2] / 2, ...pos);
  };
  post(1 - postW / 2); post(-(1 - postW / 2));
  const lh = TH - 2.15 - 0.02;
  const lsize = axis === 'x' ? [1.2, lh, opening] : [opening, lh, 1.2];
  const lpos = [wx, 2.15 + lh / 2, wz];
  staticMesh(boxGeo(...lsize, ...lpos), matFrame);
  staticCuboid(lsize[0] / 2, lsize[1] / 2, lsize[2] / 2, ...lpos);

  const hingeOff = opening / 2;
  const gDoor = 0.06, slabLen = opening - gDoor * 2;
  const pivot = new THREE.Group();
  pivot.position.set(
    axis === 'x' ? wx : wx - hingeOff + gDoor,
    0,
    axis === 'x' ? wz - hingeOff + gDoor : wz
  );
  const slabGeo = axis === 'x'
    ? boxGeo(0.09, 2.12, slabLen, 0, 1.06, slabLen / 2)
    : boxGeo(slabLen, 2.12, 0.09, slabLen / 2, 1.06, 0);
  pivot.add(new THREE.Mesh(slabGeo, doorMat[color]));
  scene.add(pivot);
  const colBody = world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(wx, 0, wz));
  world.createCollider(
    axis === 'x'
      ? RAPIER.ColliderDesc.cuboid(0.045, 1.06, opening / 2).setTranslation(0, 1.06, 0)
      : RAPIER.ColliderDesc.cuboid(opening / 2, 1.06, 0.045).setTranslation(0, 1.06, 0),
    colBody
  );
  const door = { color, x: wx, z: wz, pivot, colBody, open: false, axis };
  doors.push(door);
  return door;
}

  const slabLen = 0.78, hingeIn = 0.45 - 0.06;

}

    vertexShader: /* glsl */`
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: /* glsl */`
      uniform sampler2D tScene;
      uniform vec2 uRes;
      uniform float uTime;
      uniform float uGlitch;
      varying vec2 vUv;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
      float bayer2(vec2 a) { a = floor(a); return fract(a.x / 2.0 + a.y * a.y * 0.75); }

function stepPlayer(dt) {
  const fwd = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right = new THREE.Vector3(-fwd.z, 0, fwd.x);
  const wish = new THREE.Vector3();
  if (keys['KeyW']) wish.add(fwd);
  if (keys['KeyS']) wish.sub(fwd);
  if (keys['KeyD']) wish.add(right);
  if (keys['KeyA']) wish.sub(right);
  player.crouching = !!(keys['ControlLeft'] || keys['ControlRight']);
  player.sprinting = !!(keys['ShiftLeft'] || keys['ShiftRight']) && !player.crouching;
  const speed = CFG.walkSpeed * (player.sprinting ? CFG.sprintMul : 1) * (player.crouching ? CFG.crouchMul : 1);
  if (wish.lengthSq() > 0) {
    wish.normalize().multiplyScalar(speed);
    player.vel.x += (wish.x - player.vel.x) * Math.min(1, CFG.accel * dt);
    player.vel.z += (wish.z - player.vel.z) * Math.min(1, CFG.accel * dt);
  } else {
    player.vel.x -= player.vel.x * Math.min(1, CFG.decel * dt);
    player.vel.z -= player.vel.z * Math.min(1, CFG.decel * dt);
  }
  if (keys['Space'] && player.grounded) {
    player.vy = 5.6;
    player.grounded = false;
    playSteps({ vol: 0.18, rate: 1.25 });
  } else if (player.grounded && player.vy < 0) player.vy = -0.9;
  else player.vy += CFG.gravity * dt;

  const desired = { x: player.vel.x * dt, y: player.vy * dt, z: player.vel.z * dt };
  charController.computeColliderMovement(charCollider, desired);
  const mv = charController.computedMovement();
  player.grounded = charController.computedGrounded();
  const t = charBody.translation();
  charBody.setNextKinematicTranslation({ x: t.x + mv.x, y: t.y + mv.y, z: t.z + mv.z });
}

function updateCamera(dt) {
  const t = charBody.translation();
  const feetY = t.y - CAPS_CENTER;
  const targetEye = player.crouching ? CFG.eyeCrouch : CFG.eyeStand;
  player.eye += (targetEye - player.eye) * Math.min(1, 10 * dt);
  const moveAmt = Math.hypot(player.vel.x, player.vel.z);
  const targetAmp = moveAmt > 0.3 && player.grounded ? (player.sprinting ? 0.045 : 0.028) : 0;
  player.bobAmp += (targetAmp - player.bobAmp) * Math.min(1, 8 * dt);
  player.bobPhase += moveAmt * dt * 4.6;
  camera.position.set(
    t.x + Math.cos(player.yaw) * Math.sin(player.bobPhase * 0.5) * player.bobAmp * 0.6,
    feetY + player.eye + Math.abs(Math.sin(player.bobPhase)) * player.bobAmp,
    t.z
  );
  camera.rotation.order = 'YXZ';
  camera.rotation.set(player.pitch, player.yaw, Math.sin(player.bobPhase * 0.5) * player.bobAmp * 0.35);
  player.shake = Math.max(0, (player.shake || 0) - dt * 0.7);
  if (player.shake > 0.001) {
    camera.rotation.x += (Math.random() - 0.5) * 0.06 * player.shake;
    camera.rotation.z += (Math.random() - 0.5) * 0.05 * player.shake;
  }
  player.warp = Math.max(0, (player.warp || 0) - dt / 3.4);
  const targetFov = (player.sprinting && moveAmt > 2 ? 78 : 72)
    + Math.sin(performance.now() / 1000 * 2.1) * 3.2 * player.warp;
  if (Math.abs(camera.fov - targetFov) > 0.1) {
    camera.fov += (targetFov - camera.fov) * Math.min(1, 6 * dt);
    camera.updateProjectionMatrix();
  }
}

//======================================================================
// GRAB SYSTEM — Human Fall Flat style force-capped spring
//======================================================================
const grab = {
  prop: null,
  localAnchor: new THREE.Vector3(),
  holdDist: 1.2,
  hover: null,
};
const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3(), _v3 = new THREE.Vector3();
const _q1 = new THREE.Quaternion(), _q2 = new THREE.Quaternion();
const _e1 = new THREE.Euler();

function camForward(out) {
  return out.set(
    -Math.sin(player.yaw) * Math.cos(player.pitch),
    Math.sin(player.pitch),
    -Math.cos(player.yaw) * Math.cos(player.pitch)
  );
}
function raycastProp() {
  const dir = camForward(_v1);
  const ray = new RAPIER.Ray(
    { x: camera.position.x, y: camera.position.y, z: camera.position.z },
    { x: dir.x, y: dir.y, z: dir.z }
  );
  const hit = world.castRay(ray, CFG.grabReach, true, undefined, undefined, charCollider, charBody);
  if (!hit) return null;
  const body = hit.collider.parent();
  if (!body || !body.isDynamic()) return null;
  const prop = bodyToProp.get(body.handle);
  if (!prop) return null;
  const toi = hit.timeOfImpact !== undefined ? hit.timeOfImpact : hit.toi;
  return { prop, point: _v2.set(ray.origin.x + dir.x * toi, ray.origin.y + dir.y * toi, ray.origin.z + dir.z * toi), dist: toi };
}
function tryGrab() {
  const hit = raycastProp();
  if (!hit) return;
  const b = hit.prop.body;
  const t = b.translation(), r = b.rotation();
  _q1.set(r.x, r.y, r.z, r.w).invert();
  grab.localAnchor.copy(hit.point).sub(_v3.set(t.x, t.y, t.z)).applyQuaternion(_q1);
  grab.holdDist = Math.max(0.85, Math.min(1.7, hit.dist));
  grab.prop = hit.prop;
  playBuf('thud', { vol: 0.1, rate: 1.9 });
  if (isAuthority()) {
    b.setAngularDamping(2.2);
    b.wakeUp();
    if (hit.prop.keyColor) markKeySeen(hit.prop.keyColor);
  } else {
    sendIntent({ k: 'grab', nid: hit.prop.nid, hd: grab.holdDist });
  }
}
function releaseGrab(throwIt) {
  if (!grab.prop) return;
  if (!isAuthority()) {
    sendIntent({ k: throwIt ? 'throw' : 'rel' });
    grab.prop = null;
    return;
  }
  const b = grab.prop.body;
  b.resetForces(true);
  b.resetTorques(true);
  b.setAngularDamping(0.5);
  if (throwIt) {
    const dir = camForward(_v1);
    dir.y += 0.14;
    dir.normalize();
    const imp = Math.min(grab.prop.mass * 7, 85);
    b.applyImpulse({ x: dir.x * imp, y: dir.y * imp, z: dir.z * imp }, true);
    playBuf('whoosh', { vol: 0.4 });
  }
  grab.prop = null;
}
function stepGrab() {
  if (!grab.prop) return;
  if (!isAuthority()) {
    const tp = grab.prop.body.translation();
    const target = camForward(_v3).multiplyScalar(grab.holdDist).add(camera.position);
    if (target.distanceTo(_v1.set(tp.x, tp.y, tp.z)) > CFG.grabBreakDist + 0.6) releaseGrab(false);
    return;
  }
  const b = grab.prop.body;
  const t = b.translation(), r = b.rotation();
  _q1.set(r.x, r.y, r.z, r.w);
  const worldAnchor = _v1.copy(grab.localAnchor).applyQuaternion(_q1).add(_v2.set(t.x, t.y, t.z));
  const target = camForward(_v3).multiplyScalar(grab.holdDist).add(camera.position);
  const err = target.sub(worldAnchor);
  if (err.length() > CFG.grabBreakDist) { releaseGrab(false); return; }
  const lv = b.linvel(), av = b.angvel();
  const rArm = _v2.copy(worldAnchor).sub(_v2.set(t.x, t.y, t.z));
  const rx = worldAnchor.x - t.x, ry = worldAnchor.y - t.y, rz = worldAnchor.z - t.z;
  const velAtPoint = _v2.set(
    lv.x + av.y * rz - av.z * ry,
    lv.y + av.z * rx - av.x * rz,
    lv.z + av.x * ry - av.y * rx
  );
  const m = grab.prop.mass;
  const kp = m * 60, kd = m * 9;
  const F = err.multiplyScalar(kp).addScaledVector(velAtPoint, -kd);
  const fMax = Math.min(m * 9.81 * 0.92 + 150, 700);
  if (F.length() > fMax) F.setLength(fMax);
  b.resetForces(true);
  b.resetTorques(true);
  b.addForceAtPoint({ x: F.x, y: F.y, z: F.z }, { x: worldAnchor.x, y: worldAnchor.y, z: worldAnchor.z }, true);
  if (grab.prop.isLight) {
    _e1.set(player.pitch, player.yaw, 0, 'YXZ');
    _q2.setFromEuler(_e1);
    const cr = b.rotation();
    _q1.set(cr.x, cr.y, cr.z, cr.w).slerp(_q2, 0.3);
    b.setRotation({ x: _q1.x, y: _q1.y, z: _q1.z, w: _q1.w }, true);
    b.setAngvel({ x: 0, y: 0, z: 0 }, true);
  }
}

function addInteract(x, y, z, r, prompt, act) { interacts.push({ x, y, z, r, prompt, act }); }
function findInteract() {
  const cp = camera.position, fwd = camForward(_v3);
  let best = null, bestD = 1e9;
  for (const it of interacts) {
    const pp = it.pos ? it.pos() : it;
    const dx = pp.x - cp.x, dy = pp.y - cp.y, dz = pp.z - cp.z;
    const d = Math.hypot(dx, dy, dz);
    if (d > it.r || d >= bestD) continue;
    if (d > 1.1 && (dx * fwd.x + dy * fwd.y + dz * fwd.z) / Math.max(d, 0.001) < 0.35) continue;
    if (!it.prompt()) continue;
    best = it; bestD = d;
  }
  return best;
}

// per-frame gameplay updates
function gameplayFrame(dt, t) {
  for (let i = animators.length - 1; i >= 0; i--) {
    animators[i].update(dt);
    if (animators[i].done) animators.splice(i, 1);
  }
  for (const c of coins) {
    if (c.taken) continue;
    c.mesh.rotation.y += dt * 2.4;
    c.mesh.position.y = c.baseY + Math.sin(t * 2 + c.phase) * 0.03;
  }
  if (state === 'play') {
    const pt = charBody.translation();
    if (isAuthority()) {
      forEachPlayerPos((px, py, pz, pid) => {
        for (let i = 0; i < coins.length; i++) {
          const c = coins[i];
          if (c.taken) continue;
          const dx = c.mesh.position.x - px, dz = c.mesh.position.z - pz;
          const dy = c.mesh.position.y - (py + 0.9);
          if (dx * dx + dz * dz + dy * dy * 0.5 < 0.72) takeCoin(i, pid);
        }
        for (let i = props.length - 1; i >= 0; i--) {
          const p = props[i];
          if (!p.isCoin) continue;
          const mp = p.body.translation();
          const dx = mp.x - px, dz = mp.z - pz, dy = mp.y - (py + 0.7);
          if (dx * dx + dz * dz + dy * dy * 0.4 < 0.3) takeCoinProp(p, pid);
        }
      });
    }
    if (gate.opened && pt.z > 13.1 && pt.x > 16.5 && pt.x < 23.5) endGame();
  }
  for (const sg of signs) {
    sg.mesh.position.y = sg.baseY + Math.sin(t * 0.8 + sg.phase) * 0.05;
    sg.mesh.rotation.y = Math.atan2(camera.position.x - sg.mesh.position.x, camera.position.z - sg.mesh.position.z);
  }
  gate.redGlow.material.uniforms.uGlow.value = 0.72 + Math.sin(t * 0.9) * 0.26;
  presenceFrame(dt, t);
  updateSpots();
}

let promptTick = 0;
function updatePrompt() {
  if (state !== 'play' || !locked || uiOpen) { actionEl.textContent = ''; crossEl.classList.remove('active'); return; }
  const it = findInteract();
  if (it) {
    actionEl.textContent = it.prompt();
    crossEl.classList.add('active');
    return;
  }
  if (grab.prop) {
    actionEl.textContent = grab.prop.isLight ? S.heldLight : S.held;
    crossEl.classList.add('active');
    return;
  }
  if (++promptTick % 4 !== 0) return;
  const hit = raycastProp();
  actionEl.textContent = hit ? S.grab : '';
  crossEl.classList.toggle('active', !!hit);
}

//======================================================================
// SYNC + ANTI-SOFTLOCK RESPAWN
//======================================================================
function syncMeshes() {
  for (const p of props) {
    if (p.body.isSleeping() && isAuthority()) continue;
    const t = p.body.translation(), r = p.body.rotation();
    p.mesh.position.set(t.x, t.y, t.z);
    p.mesh.quaternion.set(r.x, r.y, r.z, r.w);
  }
}
const RESPAWN_X = floorW / 2 + 1.5, RESPAWN_Z = 19;
let respawnTick = 0;
function checkRespawns() {
  if (!isAuthority()) return;
  if (++respawnTick % 60 !== 0) return;
  for (const p of props) {
    const t = p.body.translation();
    if (t.y < -2.5 || Math.abs(t.x) > RESPAWN_X || Math.abs(t.z) > RESPAWN_Z) {
      if (grab.prop === p) releaseGrab(false);
      p.body.setTranslation({ x: p.home.x, y: p.home.y + 0.4, z: p.home.z }, true);
      p.body.setRotation({ x: p.home.q.x, y: p.home.q.y, z: p.home.q.z, w: p.home.q.w }, true);
      p.body.setLinvel({ x: 0, y: 0, z: 0 }, true);
      p.body.setAngvel({ x: 0, y: 0, z: 0 }, true);
    }
  }
}

// FLUORESCENT FLICKER
//======================================================================
let flickTimer = 0, flickState = 1;
function updateFlicker(t, dt) {
  flickTimer -= dt;
  if (flickTimer <= 0) {
    if (flickState === 1) {
      flickState = Math.random() < 0.75 ? 2 : 0;
      flickTimer = flickState === 2 ? 0.03 + Math.random() * 0.1 : 0.05 + Math.random() * 0.25;
    } else {
      flickState = 1;
      flickTimer = 0.4 + Math.random() * 3.2;
    }
  }
  const glow = flickState === 1 ? 1.0 : flickState === 2 ? 0.55 + Math.random() * 0.2 : 0.06;
  flickerGlow.value = glow * presenceDim.value;
  lightIntArr[0] = glow * presenceDim.value;
  const hum = (1.0 + Math.sin(t * 120.0) * 0.012) * presenceDim.value;
  for (let i = 1; i < NUM_LIGHTS; i++) lightIntArr[i] = hum;
  steadyGlow.value = presenceDim.value;
}

let menuT = 0;
function updateMenuCam(dt) {
  menuT += dt;
  camera.position.set(spawnX + Math.sin(menuT * 0.11) * 0.4, 1.55, spawnZ + Math.cos(menuT * 0.07) * 0.4);
  camera.rotation.order = 'YXZ';
  camera.rotation.set(Math.sin(menuT * 0.13) * 0.04, SPAWN.yaw + Math.sin(menuT * 0.05) * 0.3, 0);
}
function updateIntro(dt) {
  if (introT === 0) { playBuf('glitch', { vol: 0.5 }); playBuf('whoosh', { vol: 0.3, rate: 0.6 }); }
  introT += dt;
  const k = Math.min(1, introT / INTRO_LEN);
  const ease = 1 - Math.pow(1 - k, 3);
  camera.position.set(spawnX, 7.5 - ease * (7.5 - CFG.eyeStand), spawnZ);
  camera.rotation.order = 'YXZ';
  const shake = (1 - ease) * 0.12;
  camera.rotation.set(
    -0.6 * (1 - ease) + (Math.random() - 0.5) * shake,
    SPAWN.yaw + (Math.random() - 0.5) * shake * 2,
    (Math.random() - 0.5) * shake
  );
  postUniforms.uGlitch.value = Math.max(0, 1 - ease * 1.15);
  if (k >= 1) {
    state = 'play';
    postUniforms.uGlitch.value = 0;
    playBuf('thud', { vol: 0.5, rate: 0.7 });
  }
}

//======================================================================
// PRESENCE — nothing hunts you, but something is here.
// Visual/audio only; never touches physics or puzzle objects.
//======================================================================
const presence = {
  nextAt: 26 + Math.random() * 30,
  silhouette: null, watch: 0,
  dimT: -1, warpUntil: 0,
};
const counters = [];
function makeCounter(x, y, z, rotY) {
  const cnv = document.createElement('canvas');
  cnv.width = 64; cnv.height = 32;
  const tex = new THREE.CanvasTexture(cnv);
  tex.magFilter = THREE.NearestFilter; tex.minFilter = THREE.NearestFilter;
  const housing = new THREE.Mesh(boxGeo(0.36, 0.2, 0.05, 0, 0, 0), matMetal);
  const glowU = { value: 0.75 };
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.14), psxEmissive(tex, glowU));
  screen.position.z = 0.028;
  const g2 = new THREE.Group();
  g2.add(housing, screen);
  g2.position.set(x, y, z);
  g2.rotation.y = rotY;
  scene.add(g2);
  counters.push({ g: cnv.getContext('2d'), tex, glowU, val: 4000 + Math.floor(Math.random() * 4000), next: Math.random() });
}
makeCounter(-9, 1.72, -11.93, 0);
makeCounter(19.49, 1.5, 1, Math.PI / 2);
function drawCounter(c) {
  const g = c.g;
  g.fillStyle = '#070a06'; g.fillRect(0, 0, 64, 32);
  if (Math.random() < 0.06) return;
  g.font = 'bold 21px monospace';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = '#5fdc7a'; g.shadowBlur = 5;
  g.fillStyle = '#7fdc8a';
  g.fillText(String(c.val).padStart(4, '0'), 32, 17);
}
function lightsDip() { presence.dimT = 0; }
function distantSteps() {
  const pan = (Math.random() * 2 - 1) * 0.8;
  for (let i = 0; i < 4 + Math.floor(Math.random() * 3); i++) {
    setTimeout(() => playSteps({ vol: 0.13, rate: 0.8, pan, lp: 640 }), i * (380 + Math.random() * 120));
  }
}
function trySilhouette() {
  if (presence.silhouette) return;
  const fwd = camForward(_v1);
  for (let att = 0; att < 14; att++) {
    const cx = 1 + Math.floor(Math.random() * (MW - 2));
    const cz = 1 + Math.floor(Math.random() * (MH - 2));
    if (cellAt(cx, cz) !== '.') continue;
    const [wx, wz] = cellToWorld(cx, cz);
    const dx = wx - camera.position.x, dz = wz - camera.position.z;
    const d = Math.hypot(dx, dz);
    if (d < 8 || d > 19) continue;
    const dot = (dx * fwd.x + dz * fwd.z) / d;
    if (dot < 0.35 || dot > 0.93) continue;
    const ray = new RAPIER.Ray(
      { x: camera.position.x, y: 1.4, z: camera.position.z },
      { x: dx / d, y: 0, z: dz / d }
    );
    const hit = world.castRay(ray, d - 0.6, true, undefined, undefined, charCollider, charBody);
    if (hit) continue;
    const rig = makeRig('#0b0b0e', new Set());
    rig.root.position.set(wx, 0, wz);
    rig.root.rotation.y = Math.atan2(-dx, -dz);
    scene.add(rig.root);
    presence.silhouette = { rig, life: 3.5 + Math.random() * 1.5 };
    presence.watch = 0;
    playBuf('breath', { vol: 0.22, pan: dx > 0 ? 0.5 : -0.5, lp: 800 });
    return;
  }
}
function vanishSilhouette(seen) {
  if (!presence.silhouette) return;
  scene.remove(presence.silhouette.rig.root);
  presence.silhouette = null;
  if (seen) {
    postUniforms.uGlitch.value = Math.max(postUniforms.uGlitch.value, 0.33);
    playBuf('stinger', { vol: 0.3, rate: 1.4 });
    player.shake = Math.max(player.shake || 0, 0.35);
  }
}
function triggerPresence() {
  const roll = Math.random();
  const pan = (Math.random() * 2 - 1) * 0.7;
  if (roll < 0.15) lightsDip();
  else if (roll < 0.33) playWhisper(pan);
  else if (roll < 0.48) playKnock(pan);
  else if (roll < 0.6) playBuf('breath', { vol: 0.3, pan, lp: 900 });
  else if (roll < 0.72) distantSteps();
  else if (roll < 0.88) trySilhouette();
  else { presence.warpUntil = performance.now() / 1000 + 3.2; player.warp = 1; }
}
const presenceDim = { value: 1 };
function presenceFrame(dt, t) {
  for (const c of counters) {
    c.next -= dt;
    if (c.next <= 0) {
      c.next = 0.4 + Math.random() * 0.9;
      c.val -= 1 + Math.floor(Math.random() * 16);
      if (Math.random() < 0.07) c.val += 77;
      if (c.val < 0) c.val = 8000 + Math.floor(Math.random() * 1500);
      drawCounter(c);
      c.tex.needsUpdate = true;
    }
    c.glowU.value = 0.62 + Math.random() * 0.2;
  }
  if (presence.dimT >= 0) {
    presence.dimT += dt;
    const dtt = presence.dimT;
    presenceDim.value = dtt < 0.25 ? 1 - (dtt / 0.25) * 0.68
      : dtt < 1.0 ? 0.32
      : dtt < 2.0 ? 0.32 + ((dtt - 1.0) / 1.0) * 0.68 : 1;
    if (dtt >= 2.0) { presence.dimT = -1; presenceDim.value = 1; }
  }
  const warpLeft = presence.warpUntil - t;
  sharedLightUniforms.uWarpT.value = t;
  sharedLightUniforms.uWarp.value = warpLeft > 0 ? Math.sin(Math.min(1, (3.2 - warpLeft) / 0.8) * Math.PI * 0.5) * Math.min(1, warpLeft / 0.8) : 0;
  if (state !== 'play') return;
  if (postUniforms.uGlitch.value > 0 && state === 'play') {
    postUniforms.uGlitch.value = Math.max(0, postUniforms.uGlitch.value - dt * 1.4);
  }
  presence.nextAt -= dt * (regionAt(camera.position.x, camera.position.z) === 'hub' ? 0.45 : 1);
  if (presence.nextAt <= 0) {
    triggerPresence();
    presence.nextAt = 32 + Math.random() * 55;
  }
  if (presence.silhouette) {
    const sil = presence.silhouette;
    sil.life -= dt;
    animateRig(sil.rig, dt, { speed: 0, crouch: false, pitch: 0, carryPos: null, pointPos: null });
    const dx = sil.rig.root.position.x - camera.position.x;
    const dz = sil.rig.root.position.z - camera.position.z;
    const d = Math.hypot(dx, dz);
    const fwd = camForward(_v1);
    const dot = (dx * fwd.x + dz * fwd.z) / Math.max(d, 0.01);
    if (dot > 0.965) presence.watch += dt;
    else presence.watch = Math.max(0, presence.watch - dt * 2);
    if (presence.watch > 0.5) vanishSilhouette(true);
    else if (sil.life <= 0) vanishSilhouette(false);
  }
}

//======================================================================
// AUDIO — fetched CC samples (Wikimedia Commons, CORS) with crafted
// noise-based synthesis as per-sound fallback. Unlocked on first click.
//======================================================================
const SAMPLE_URLS = {
  hum: 'https://upload.wikimedia.org/wikipedia/commons/a/ab/Mains_hum_60_Hz.ogg',
  steps: 'https://upload.wikimedia.org/wikipedia/commons/2/29/ZapSibAudio-Steps.ogg',
  knock: 'https://upload.wikimedia.org/wikipedia/commons/1/1c/Knocking_on_wood_or_door.ogg',
  whisper: 'https://upload.wikimedia.org/wikipedia/commons/9/9b/En-us-whisper.ogg',
};
const AU = { ctx: null, master: null, buffers: {}, humGain: null, ready: false, fetched: {} };

function auNoise(ctx2, dur) {
  const b = ctx2.createBuffer(1, Math.ceil(dur * 44100), 44100);
  const d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return b;
}
async function auRender(dur, build) {
  const ctx2 = new OfflineAudioContext(1, Math.ceil(dur * 44100), 44100);
  build(ctx2);
  return ctx2.startRendering();
}
async function auSynthAll() {
  const B = AU.buffers;
  B.creak = await auRender(0.9, c => {
    const o = c.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(64, 0); o.frequency.linearRampToValueAtTime(170, 0.7);
    const lfo = c.createOscillator(); lfo.frequency.value = 26;
    const lg = c.createGain(); lg.gain.value = 22;
    lfo.connect(lg); lg.connect(o.frequency);
    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 9;
    bp.frequency.setValueAtTime(340, 0); bp.frequency.linearRampToValueAtTime(920, 0.8);
    const g = c.createGain();
    g.gain.setValueAtTime(0, 0); g.gain.linearRampToValueAtTime(0.5, 0.08);
    g.gain.setValueAtTime(0.5, 0.6); g.gain.linearRampToValueAtTime(0, 0.88);
    o.connect(bp); bp.connect(g); g.connect(c.destination);
    o.start(); lfo.start();
  });
  B.rumble = await auRender(3.2, c => {
    const src = c.createBufferSource(); src.buffer = auNoise(c, 3.2);
    const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 58; lp.Q.value = 0.6;
    const sub = c.createOscillator(); sub.frequency.value = 31;
    const g = c.createGain();
    g.gain.setValueAtTime(0, 0); g.gain.linearRampToValueAtTime(1.6, 0.5);
    g.gain.setValueAtTime(1.6, 2.1); g.gain.linearRampToValueAtTime(0, 3.1);
    src.connect(lp); lp.connect(g); sub.connect(g); g.connect(c.destination);
    src.start(); sub.start();
  });
  B.whoosh = await auRender(0.45, c => {
    const src = c.createBufferSource(); src.buffer = auNoise(c, 0.45);
    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.6;
    bp.frequency.setValueAtTime(420, 0);
    bp.frequency.linearRampToValueAtTime(1900, 0.16);
    bp.frequency.linearRampToValueAtTime(520, 0.42);
    const g = c.createGain();
    g.gain.setValueAtTime(0, 0); g.gain.linearRampToValueAtTime(0.9, 0.14);
    g.gain.linearRampToValueAtTime(0, 0.43);
    src.connect(bp); bp.connect(g); g.connect(c.destination);
    src.start();
  });
  B.thud = await auRender(0.3, c => {
    const src = c.createBufferSource(); src.buffer = auNoise(c, 0.3);
    const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 210;
    const o = c.createOscillator(); o.frequency.setValueAtTime(82, 0); o.frequency.exponentialRampToValueAtTime(46, 0.18);
    const g = c.createGain();
    g.gain.setValueAtTime(1.1, 0); g.gain.exponentialRampToValueAtTime(0.001, 0.26);
    src.connect(lp); lp.connect(g); o.connect(g); g.connect(c.destination);
    src.start(); o.start();
  });
  B.coin = await auRender(0.5, c => {
    for (const [f, t0, dur2] of [[2093, 0, 0.32], [2793, 0.07, 0.4]]) {
      const o = c.createOscillator(); o.frequency.value = f;
      const g = c.createGain();
      g.gain.setValueAtTime(0, t0); g.gain.linearRampToValueAtTime(0.22, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur2);
      o.connect(g); g.connect(c.destination); o.start(t0);
    }
  });
  B.beep = await auRender(0.09, c => {
    const o = c.createOscillator(); o.type = 'square'; o.frequency.value = 1245;
    const g = c.createGain();
    g.gain.setValueAtTime(0.12, 0); g.gain.exponentialRampToValueAtTime(0.001, 0.08);
    o.connect(g); g.connect(c.destination); o.start();
  });
  B.breath = await auRender(3.4, c => {
    const src = c.createBufferSource(); src.buffer = auNoise(c, 3.4);
    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 560; bp.Q.value = 0.8;
    const g = c.createGain();
    g.gain.setValueAtTime(0, 0);
    g.gain.linearRampToValueAtTime(0.5, 0.7); g.gain.linearRampToValueAtTime(0.06, 1.4);
    g.gain.linearRampToValueAtTime(0.62, 2.2); g.gain.linearRampToValueAtTime(0, 3.3);
    src.connect(bp); bp.connect(g); g.connect(c.destination);
    src.start();
  });
  B.stinger = await auRender(2.8, c => {
    for (const f of [55, 55.8, 82.6]) {
      const o = c.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
      const lp = c.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(120, 0); lp.frequency.linearRampToValueAtTime(420, 1.8);
      lp.frequency.linearRampToValueAtTime(90, 2.7);
      const g = c.createGain();
      g.gain.setValueAtTime(0, 0); g.gain.linearRampToValueAtTime(0.16, 1.7);
      g.gain.linearRampToValueAtTime(0, 2.75);
      o.connect(lp); lp.connect(g); g.connect(c.destination); o.start();
    }
    const src = c.createBufferSource(); src.buffer = auNoise(c, 2.8);
    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 300; bp.Q.value = 0.5;
    const g2 = c.createGain();
    g2.gain.setValueAtTime(0, 0); g2.gain.linearRampToValueAtTime(0.05, 1.8); g2.gain.linearRampToValueAtTime(0, 2.7);
    src.connect(bp); bp.connect(g2); g2.connect(c.destination); src.start();
  });
  B.glitch = await auRender(0.7, c => {
    const src = c.createBufferSource(); src.buffer = auNoise(c, 0.7);
    const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 900;
    const g = c.createGain();
    for (let i = 0; i < 9; i++) {
      const t0 = i * 0.075;
      g.gain.setValueAtTime(Math.random() * 0.5, t0);
      g.gain.setValueAtTime(0.02, t0 + 0.03 + Math.random() * 0.03);
    }
    g.gain.linearRampToValueAtTime(0, 0.68);
    src.connect(hp); hp.connect(g); g.connect(c.destination); src.start();
  });
  B.humSynth = await auRender(2.0, c => {
    for (const [f, v] of [[50, 0.16], [100, 0.1], [150, 0.05], [250, 0.02]]) {
      const o = c.createOscillator(); o.frequency.value = f;
      const g = c.createGain(); g.gain.value = v;
      o.connect(g); g.connect(c.destination); o.start();
    }
    const src = c.createBufferSource(); src.buffer = auNoise(c, 2);
    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 3400; bp.Q.value = 2;
    const g2 = c.createGain(); g2.gain.value = 0.012;
    src.connect(bp); bp.connect(g2); g2.connect(c.destination); src.start();
  });
}
async function auFetchSamples() {
  await Promise.all(Object.entries(SAMPLE_URLS).map(async ([k, u]) => {
    try {
      const r = await fetch(u);
      if (!r.ok) return;
      const ab = await r.arrayBuffer();
      AU.buffers[k] = await AU.ctx.decodeAudioData(ab);
      AU.fetched[k] = true;
      if (k === 'whisper') {
        const b = AU.buffers[k];
        const rb = AU.ctx.createBuffer(b.numberOfChannels, b.length, b.sampleRate);
        for (let ch = 0; ch < b.numberOfChannels; ch++) {
          const src2 = b.getChannelData(ch), dst = rb.getChannelData(ch);
          for (let i = 0; i < src2.length; i++) dst[i] = src2[src2.length - 1 - i];
        }
        AU.buffers.whisperRev = rb;
      }
    } catch (e) { /* fallback synth covers it */ }
  }));

{

function netFixed() {
  if (!session || !session.started) return;
  netTick++;
  if (session.isHost) {
    for (const peer of session.peers.values()) {
      if (!peer.input || !peer.kinBody) continue;
      const c = peer.kinBody.translation();
      const tx = peer.input.p[0], ty = peer.input.p[1] + CAPS_CENTER, tz = peer.input.p[2];
      peer.kinBody.setNextKinematicTranslation({
        x: c.x + (tx - c.x) * 0.5, y: c.y + (ty - c.y) * 0.5, z: c.z + (tz - c.z) * 0.5,
      });
      peer.lastPos = peer.input.p;
      const rp = netPlayers.get(peer.id);
      if (rp) {
        rp.t.set(peer.input.p[0], peer.input.p[1], peer.input.p[2]);
        rp.yaw = peer.input.yaw; rp.pitch = peer.input.pitch;
        rp.crouch = !!peer.input.c; rp.heldNid = peer.grabProp?.nid || 0;
      }
      stepGuestGrab(peer);
    }
    if (netTick % 3 === 0) {
      const ft = charBody.translation();
      const pl = [[session.me.id, r3(ft.x), r3(ft.y - CAPS_CENTER), r3(ft.z), r3(player.yaw), r3(player.pitch), player.crouching ? 1 : 0, grab.prop?.nid || 0]];
      for (const peer of session.peers.values()) {
        if (peer.lastPos) pl.push([peer.id, peer.lastPos[0], peer.lastPos[1], peer.lastPos[2], peer.input?.yaw || 0, peer.input?.pitch || 0, peer.input?.c || 0, peer.grabProp?.nid || 0]);
      }
      const pr = [];
      for (const p of props) {
        const held = grab.prop === p || [...session.peers.values()].some(p2 => p2.grabProp === p);
        if (p.body.isSleeping() && !held) continue;
        const t = p.body.translation(), q = p.body.rotation();
        pr.push([p.nid, r3(t.x), r3(t.y), r3(t.z), r3(q.x), r3(q.y), r3(q.z), r3(q.w)]);
      }
      const sn = JSON.stringify({ t: 'sn', pl, pr });
      for (const peer of session.peers.values()) {
        if (peer.chSt?.readyState === 'open') peer.chSt.send(sn);
      }
    }
  } else {
    if (netSnap) {
      for (const e of netSnap.pr) {
        const p = nidMap.get(e[0]);
        if (!p) continue;
        const bt = p.body.translation();
        p.body.setNextKinematicTranslation({
          x: bt.x + (e[1] - bt.x) * 0.4, y: bt.y + (e[2] - bt.y) * 0.4, z: bt.z + (e[3] - bt.z) * 0.4,
        });
        const br2 = p.body.rotation();
        _q1.set(br2.x, br2.y, br2.z, br2.w).slerp(_q2.set(e[4], e[5], e[6], e[7]), 0.4);
        p.body.setNextKinematicRotation({ x: _q1.x, y: _q1.y, z: _q1.z, w: _q1.w });
      }
      for (const e of netSnap.pl) {
        if (e[0] === session.me.id) continue;
        const rp = netPlayers.get(e[0]);
        if (rp) {
          rp.t.set(e[1], e[2], e[3]);
          rp.yaw = e[4]; rp.pitch = e[5];
          rp.crouch = !!e[6]; rp.heldNid = e[7] || 0;
        }
      }
    }
    if (netTick % 3 === 0 && session.host?.chSt?.readyState === 'open') {
      const ft = charBody.translation();
      const msg = {
        t: 'in',
        p: [r3(ft.x), r3(ft.y - CAPS_CENTER), r3(ft.z)],
        yaw: r3(player.yaw), pitch: r3(player.pitch), tp: 0,
        c: player.crouching ? 1 : 0,
      };
      if (grab.prop) {
        const tp2 = camForward(_v1).multiplyScalar(grab.holdDist).add(camera.position);

function netFrame(dt) {
  const now = performance.now() / 1000;
  for (const rp of netPlayers.values()) {
    rp.sPrev.copy(rp.s);
    rp.s.lerp(rp.t, 1 - Math.exp(-14 * dt));
    rp.mesh.position.copy(rp.s);
    const dy2 = rp.yaw - rp.mesh.rotation.y;
    rp.mesh.rotation.y += Math.atan2(Math.sin(dy2), Math.cos(dy2)) * Math.min(1, 12 * dt);
    const speed = dt > 0 ? rp.s.distanceTo(rp.sPrev) / dt : 0;
    const heldProp = rp.heldNid ? nidMap.get(rp.heldNid) : null;
    animateRig(rp.rig, dt, {
      speed,
      crouch: rp.crouch,
      pitch: rp.pitch,
      carryPos: heldProp ? heldProp.mesh.position : null,
      pointPos: rp.pointUntil > now ? rp.pointPos : null,
    });
    const d = rp.s.distanceTo(camera.position);
    rp.nickMesh.visible = d < 8;
    if (rp.nickMesh.visible) {
      rp.nickMesh.rotation.y = Math.atan2(camera.position.x - rp.s.x, camera.position.z - rp.s.z) - rp.mesh.rotation.y;
    }
  }

}

// signaling adapters
function makeLocalSignal(code, id) {
  const bc = new BroadcastChannel('brl-' + code);
  const subs = [];
  bc.onmessage = e => { const m = e.data; if (m && m.to === id) subs.forEach(f => f(m)); };
  return {
    send(to, msg) { bc.postMessage({ ...msg, to }); },
    on(f) { subs.push(f); },
    close() { try { bc.close(); } catch {} },
  };
}
let fbCtx = null;
async function fbInit() {
  if (fbCtx) return fbCtx;
  const appM = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const dbM = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
  const app = appM.initializeApp(FIREBASE_CONFIG);
  fbCtx = { m: dbM, db: dbM.getDatabase(app) };
  return fbCtx;
}
async function makeFirebaseSignal(code, id) {
  const { m, db } = await fbInit();
  const subs = [];
  m.onChildAdded(m.ref(db, `rooms/${code}/inbox/${id}`), snap => {
    const v = snap.val();
    m.remove(snap.ref);
    subs.forEach(f => f(v));
  });
  if (id === 'host') {
    m.set(m.ref(db, `rooms/${code}/meta`), { created: m.serverTimestamp() });
    m.onDisconnect(m.ref(db, `rooms/${code}`)).remove();
  }
  return {
    send(to, msg) { m.push(m.ref(db, `rooms/${code}/inbox/${to}`), msg); },
    on(f) { subs.push(f); },
    close() { if (id === 'host') m.remove(m.ref(db, `rooms/${code}`)); },
  };
}
async function makeSignal(code, id) {
  return FIREBASE_CONFIG ? makeFirebaseSignal(code, id) : makeLocalSignal(code, id);
}

async function hostSignal(m) {
  if (!session?.isHost) return;
  if (m.type === 'offer') {
    const peer = createPeerShell(m.from);
    session.peers.set(m.from, peer);
    peer.pc = new RTCPeerConnection(RTC_CFG);
    peer.pc.onicecandidate = e => { if (e.candidate) session.sig.send(m.from, { from: 'host', type: 'ice', payload: e.candidate.toJSON() }); };
    peer.pc.onconnectionstatechange = () => {
      if (['failed', 'disconnected', 'closed'].includes(peer.pc.connectionState)) peerLost(peer);
    };
    peer.pc.ondatachannel = e => {
      const ch = e.channel;
      if (ch.label === 'ev') {
        peer.chEv = ch;
        ch.onmessage = ev2 => hostEvMsg(peer, JSON.parse(ev2.data));
      } else if (ch.label === 'st') {
        peer.chSt = ch;
        ch.onmessage = ev2 => { peer.input = JSON.parse(ev2.data); };
      }
    };
    await peer.pc.setRemoteDescription(m.payload);
    const ans = await peer.pc.createAnswer();
    await peer.pc.setLocalDescription(ans);
    session.sig.send(m.from, { from: 'host', type: 'answer', payload: { type: ans.type, sdp: ans.sdp } });

  };
  const pc = new RTCPeerConnection(RTC_CFG);
  const chEv = pc.createDataChannel('ev');

  session.host = {

  pc.onconnectionstatechange = () => {

}
document.getElementById('dc-btn').addEventListener('click', () => {
  document.getElementById('discon').classList.remove('show');
  guestBecomeSolo();
  renderer.domElement.requestPointerLock();
});
function guestBecomeSolo() {
  for (const p of props) p.body.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
  for (const id of [...netPlayers.keys()]) removeRemotePlayer(id);
  teardownSession(true);
}
function teardownSession(keepPlaying = false) {
  if (!session) return;
  try {
    if (session.isHost) { for (const p of session.peers.values()) p.pc?.close(); }
    else session.host?.pc?.close();
    session.sig?.close();
  } catch {}
  session = null;
  netSnap = null;
  if (!keepPlaying) for (const id of [...netPlayers.keys()]) removeRemotePlayer(id);
}

function startGame(settings) {
  setLanguage(settings.lang || LANG);
  DIFFICULTY = settings.diff || 'normal';
  if (session) {
    session.started = true;
    session.settings = settings;
    const idx = Math.max(0, session.playersInfo.findIndex(p2 => p2.id === session.me.id));
    charBody.setTranslation({ x: spawnX + (idx - 1) * 0.9, y: CAPS_CENTER, z: spawnZ }, true);
    if (!session.isHost) for (const p of props) toKinematic(p);
    for (const info of session.playersInfo) {
      if (info.id !== session.me.id) addRemotePlayer(info);
    }
    if (session.isHost) {
      for (const peer of session.peers.values()) {
        peer.started = true;
        peer.kinBody = world.createRigidBody(
          RAPIER.RigidBodyDesc.kinematicPositionBased().setTranslation(spawnX, CAPS_CENTER, spawnZ)
        );
        world.createCollider(RAPIER.ColliderDesc.capsule(CAPS_HALF, CAPS_R).setFriction(0.1), peer.kinBody);
      }
    }
  }
  overlayEl.classList.add('hidden');
  state = 'intro';
  introT = 0;
  renderer.domElement.requestPointerLock();
}

function setDomTexts() {
  document.querySelector('#pause h2').textContent = S.paused;
  document.querySelector('#pause p').textContent = S.resume;
  document.getElementById('shop-title').textContent = S.shopTitle;
  document.getElementById('shop-close').textContent = S.shopClose;
  document.getElementById('kp-title').textContent = S.kpTitle;
  document.getElementById('kp-close').textContent = S.kpClose;
  document.getElementById('note-close').textContent = S.noteClose;
  document.getElementById('end-title').textContent = S.endTitle;
  document.getElementById('end-text').textContent = S.endText;
  document.getElementById('end-btn').textContent = S.endBtn;
  document.getElementById('m-solo').textContent = S.menuSolo;
  document.getElementById('m-host').textContent = S.menuHost;
  document.getElementById('m-join').textContent = S.menuJoin;
  document.getElementById('m-note').textContent = FIREBASE_CONFIG ? '' : S.menuLocalNote;
  document.getElementById('m-jointitle').textContent = S.joinTitle;
  document.getElementById('m-joingo').textContent = S.joinGo;
  document.getElementById('m-back1').textContent = S.joinBack;
  document.getElementById('m-start').textContent = S.lobbyStart;
  document.getElementById('m-leave').textContent = S.lobbyLeave;
}
function setLanguage(l) {
  const changed = LANG !== l;
  LANG = l;
  S = STR[l];
  setDomTexts();
  if (changed) rebuildLocalized();
}
function renderLobby() {
  if (!session) return;
  document.getElementById('m-room').textContent = S.lobbyRoom(session.code);
  const wrap = document.getElementById('m-players');
  wrap.innerHTML = '';
  for (const p of session.playersInfo) {
    const row = document.createElement('div');
    row.className = 'm-player';
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.style.background = AVATAR_COLORS.find(c => c.id === p.color)?.css || '#888';
    const nm = document.createElement('span');
    nm.textContent = `${p.isHost ? S.hostTag + ' ' : ''}${p.nick}${p.id === session.me.id ? ' ' + S.youTag : ''}`;
    const rdy = document.createElement('span');
    rdy.className = 'rdy' + (p.ready ? '' : ' no');
    rdy.textContent = p.ready ? S.lobbyReady : S.lobbyUnready;
    row.append(chip, nm, rdy);
    wrap.appendChild(row);
  }
  document.getElementById('m-nick').value = myNick;
  const colWrap = document.getElementById('m-colors');
  colWrap.innerHTML = '';
  for (const c of AVATAR_COLORS) {
    const sw = document.createElement('div');
    sw.className = 'sw' + (c.id === myColor ? ' sel' : '');
    sw.style.background = c.css;
    sw.onclick = () => {
      myColor = c.id;
      localStorage.setItem('brl-color', c.id);
      if (session.isHost) { session.me.color = c.id; refreshPlayersInfo(); }
      else { session.me.color = c.id; session.host?.sendEv({ t: 'setColor', c: c.id }); renderLobby(); }
    };
    colWrap.appendChild(sw);
  }
  const isHost = session.isHost;
  document.getElementById('m-hostopts').style.display = isHost ? 'flex' : 'none';
  document.getElementById('m-lang').textContent = S.lobbyLang(session.settings?.lang || LANG);
  document.getElementById('m-diff').textContent = S.lobbyDiff(session.settings?.diff || 'normal');
  document.getElementById('m-ready').textContent = session.me.ready ? S.lobbyReady + ' ✓' : S.lobbyUnready;
  const startBtn = document.getElementById('m-start');
  startBtn.style.display = isHost ? '' : 'none';
  if (isHost) startBtn.disabled = !(session.playersInfo.length && session.playersInfo.every(p => p.ready));
}
const texMenuWall = makeCanvas(256, (g, s) => {
  g.fillStyle = '#c3ac50'; g.fillRect(0, 0, s, s);
  for (let x = 0; x < s; x += 32) {
    g.fillStyle = '#b7a049'; g.fillRect(x + 9, 0, 14, s);
    g.fillStyle = '#cdb65b'; g.fillRect(x + 8, 0, 1, s);
    g.fillStyle = '#cdb65b'; g.fillRect(x + 23, 0, 1, s);
    g.fillStyle = '#ab9541'; g.fillRect(x + 15, 0, 2, s);
  }
  stains(g, s, 7, 24, 80, '70,52,16', 0.08);
  noiseOver(g, s, 8);
});
function initMenu() {
  setDomTexts();
  menuEl.hidden = false;
  showScreen('main');
  const bg = document.getElementById('menubg');
  bg.style.backgroundImage = `url(${texMenuWall.image.toDataURL()})`;
  overlayEl.addEventListener('mousemove', e => {
    const mx = (e.clientX / window.innerWidth - 0.5) * 2;
    const my = (e.clientY / window.innerHeight - 0.5) * 2;
    bg.style.transform = `translate(${(-mx * 22).toFixed(1)}px, ${(-my * 14).toFixed(1)}px)`;
  });
  document.getElementById('m-solo').onclick = () => {
    startGame({ lang: LANG, diff: DIFFICULTY });
  };
  document.getElementById('m-host').onclick = () => hostRoom();
  document.getElementById('m-join').onclick = () => {
    showScreen('join');
    document.getElementById('m-joinmsg').textContent = '';
    document.getElementById('m-code').value = '';
    document.getElementById('m-code').focus();
  };
  document.getElementById('m-back1').onclick = () => { teardownSession(); showScreen('main'); };
  document.getElementById('m-joingo').onclick = () => {
    const code = document.getElementById('m-code').value.trim().toUpperCase();
    if (code.length < 4) return;
    joinRoom(code);
  };
  document.getElementById('m-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('m-joingo').click();
    e.stopPropagation();
  });
  document.getElementById('m-nick').addEventListener('change', e => {
    myNick = (e.target.value.trim() || 'ANON').slice(0, 12).toUpperCase();
    localStorage.setItem('brl-nick', myNick);
    if (!session) return;
    session.me.nick = myNick;
    if (session.isHost) refreshPlayersInfo();
    else session.host?.sendEv({ t: 'setNick', n: myNick });
  });
  document.getElementById('m-nick').addEventListener('keydown', e => e.stopPropagation());
  document.getElementById('m-ready').onclick = () => {
    if (!session) return;
    session.me.ready = !session.me.ready;
    if (session.isHost) refreshPlayersInfo();
    else { session.host?.sendEv({ t: 'setReady', v: session.me.ready }); renderLobby(); }
  };
  document.getElementById('m-lang').onclick = () => {
    if (!session?.isHost) return;
    session.settings.lang = session.settings.lang === 'pl' ? 'en' : 'pl';
    setLanguage(session.settings.lang);
    refreshPlayersInfo();
  };
  document.getElementById('m-diff').onclick = () => {
    if (!session?.isHost) return;
    const order = ['casual', 'normal', 'hardcore'];
    session.settings.diff = order[(order.indexOf(session.settings.diff) + 1) % 3];
    refreshPlayersInfo();
  };
  document.getElementById('m-start').onclick = () => {
    if (!session?.isHost) return;
    if (!session.playersInfo.every(p => p.ready)) return;
    const settings = { ...session.settings };
    for (const p of session.peers.values()) p.sendEv({ t: 'start', settings });
    startGame(settings);
  };
  document.getElementById('m-leave').onclick = () => {
    if (session?.isHost) for (const p of session.peers.values()) p.sendEv({ t: 'ev', ev: {} });
    else session?.host?.sendEv({ t: 'bye' });
    teardownSession();
    showScreen('main');
  };
}
initMenu();

//======================================================================
// MAIN LOOP — fixed-step physics + render
//======================================================================
let last = performance.now(), acc = 0;
let fpsAcc = 0, fpsN = 0, fpsClock = 0;
let manualTick = false;
function loop(now) {
  if (!manualTick) requestAnimationFrame(loop);
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.1) dt = 0.1;
  const t = now / 1000;

  postUniforms.uTime.value = t;
  updateFlicker(t, dt);

  acc += dt;
  let sub = 0;
  while (acc >= CFG.step && sub < 3) {
    if (state === 'play' && locked) stepPlayer(CFG.step);
    netFixed();
    stepGrab();
    world.step();
    syncMeshes();
    checkRespawns();
    acc -= CFG.step;
    sub++;
  }
  if (sub === 3) acc = 0;

  if (state === 'menu') updateMenuCam(dt);
  else if (state === 'intro') updateIntro(dt);
  else updateCamera(dt);

  gameplayFrame(dt, t);
  netFrame(dt);
  audioFrame(dt);
  updatePrompt();

  updateMirror();
  renderer.setRenderTarget(rt);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
  postUniforms.tScene.value = rt.texture;
  renderer.render(postScene, postCam);

  fpsAcc += dt; fpsN++; fpsClock += dt;
  if (fpsClock >= 0.5) {
    let awake = 0;
    for (const p of props) if (!p.body.isSleeping()) awake++;
    fpsEl.textContent = `${Math.round(fpsN / fpsAcc)} FPS · ${awake} AWAKE`;
    fpsAcc = 0; fpsN = 0; fpsClock = 0;
  }
}
requestAnimationFrame(loop);

// debug hooks (used for automated verification during development)
window.__br = {
  props, player, grab, tryGrab, releaseGrab, doors, gate, safe, coins,
  world, RAPIER, raycastProp, camera, camForward, nidMap,
  shopState, setGold, openSafe, openShop, openKeypad, kpPress, findInteract,
  insertKey, openDoor, performDoor, performSafe, attemptBuy, applyEvent,
  hostRoom, joinRoom, startGame, setLanguage, netPlayers, addRemotePlayer,
  presence, triggerPresence, trySilhouette, lightsDip, doPing, AU, audioInit,
  renderer, rtInfo: () => {
    const v = new THREE.Vector4();
    renderer.getViewport(v);
    const s = new THREE.Vector2();
    renderer.getSize(s);
    return { viewport: [v.x, v.y, v.z, v.w], size: [s.x, s.y], rt: [rt.width, rt.height], canvas: [renderer.domElement.width, renderer.domElement.height] };
  },
  mirror, makeRig, animateRig, applyCosmetic, attemptBuy: (id) => attemptBuy(id),
  session: () => session,
  async netSelfTest() {
    const a = new RTCPeerConnection(), b = new RTCPeerConnection();
    const ch = a.createDataChannel('t');
    const done = new Promise(res => {
      b.ondatachannel = e => { e.channel.onmessage = ev => res(ev.data); };
      ch.onopen = () => ch.send('rtc-ok');
    });
    a.onicecandidate = e => e.candidate && b.addIceCandidate(e.candidate).catch(() => {});
    b.onicecandidate = e => e.candidate && a.addIceCandidate(e.candidate).catch(() => {});
    const o = await a.createOffer(); await a.setLocalDescription(o); await b.setRemoteDescription(o);
    const an = await b.createAnswer(); await b.setLocalDescription(an); await a.setRemoteDescription(an);
    const r = await Promise.race([done, new Promise(res => setTimeout(() => res('timeout'), 6000))]);
    a.close(); b.close();
    return r;
  },
  setView(x, z, yaw, pitch) {
    charBody.setTranslation({ x, y: CAPS_CENTER, z }, true);
    player.yaw = yaw; player.pitch = pitch;
    camera.position.set(x, CFG.eyeStand, z);
    camera.rotation.order = 'YXZ';
    camera.rotation.set(pitch, yaw, 0);
  },
  aimAt(x, y, z) {
    const dx = x - camera.position.x, dy = y - camera.position.y, dz = z - camera.position.z;
    player.yaw = Math.atan2(-dx, -dz);
    player.pitch = Math.atan2(dy, Math.hypot(dx, dz));
    camera.rotation.set(player.pitch, player.yaw, 0);
  },
  skipIntro() {
    state = 'play';
    overlayEl.classList.add('hidden');
    postUniforms.uGlitch.value = 0;
    updateCamera(0.016);
  },
  awake: () => props.filter(p => !p.body.isSleeping()).length,
  state: () => state,
  region: () => regionAt(camera.position.x, camera.position.z),
  tick(n = 1) {
    manualTick = true;
    for (let i = 0; i < n; i++) loop(last + 16.7);
    manualTick = false;
  },
};
